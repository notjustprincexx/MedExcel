<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aurora - Study Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        // Check for saved theme preference to prevent flickering
        (function() {
            const savedTheme = localStorage.getItem('medexcel_theme');
            if (savedTheme === 'light') {
                document.documentElement.classList.add('light-mode');
            }
        })();

        // Auth Gatekeeper
        (function () {
            const savedUser = localStorage.getItem("nativeUser");
            if (savedUser && savedUser !== "undefined" && savedUser !== "null") {
                try { window.currentUser = JSON.parse(savedUser); } catch (e) {}
            }
        })();
    </script>

    <style>
        :root {
            /* Premium Dark App Color System (Default) */
            --bg-body: #09090b; 
            --bg-surface: #121216; 
            --bg-hover: #1a1a20;
            --bg-glass: rgba(255, 255, 255, 0.05); 
            
            --text-main: #ffffff; 
            --text-muted: #94a3b8; 
            --text-light: #cbd5e1;
            
            --accent-btn: #a78bfa; 
            --btn-text: #000000; 
            
            --accent-blue: #3b82f6;
            --accent-green: #34d399; 
            --accent-orange: #f97316;
            --accent-red: #f87171;
            --accent-yellow: #fbbf24;
            
            --border-color: rgba(255, 255, 255, 0.06); 
            
            --header-bg: rgba(9, 9, 11, 0.95);
            --nav-bg: #09090b;
            --nav-icon: #71717a;
            
            --ease-snap: cubic-bezier(0.19, 1, 0.22, 1);
        }

        .light-mode {
            /* Premium Light App Color System */
            --bg-body: #f1f5f9; 
            --bg-surface: #ffffff; 
            --bg-hover: #f8fafc;
            --bg-glass: rgba(0, 0, 0, 0.05); 
            
            --text-main: #0f172a; 
            --text-muted: #64748b; 
            --text-light: #475569;
            
            --accent-btn: #8b5cf6; 
            --btn-text: #ffffff; 
            
            --accent-blue: #2563eb;
            --accent-green: #10b981; 
            --accent-orange: #ea580c;
            --accent-red: #ef4444;
            --accent-yellow: #d97706;
            
            --border-color: rgba(0, 0, 0, 0.06); 
            
            --header-bg: rgba(241, 245, 249, 0.95);
            --nav-bg: #ffffff;
            --nav-icon: #94a3b8;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg-body); color: var(--text-main);
            font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
            -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: relative;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hidden { display: none !important; }

        .fade-in { animation: fadeIn 0.4s var(--ease-snap) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Skeleton Loading Animation */
        .skeleton {
            background: linear-gradient(90deg, rgba(128, 128, 128, 0.1) 25%, rgba(128, 128, 128, 0.2) 50%, rgba(128, 128, 128, 0.1) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
            color: transparent !important;
            border-color: transparent !important;
            pointer-events: none;
            overflow: hidden;
        }
        .skeleton * { visibility: hidden; }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .layout-wrapper { flex: 1; display: flex; width: 100%; height: 100%; overflow: hidden; padding-bottom: 80px; position: relative; z-index: 10; }
        @media (min-width: 1024px) { .layout-wrapper { padding-bottom: 0; } }

        .sidebar { width: 100%; background: var(--bg-body); display: flex; flex-direction: column; height: 100%; z-index: 20; transition: transform 0.3s, background-color 0.3s ease; }
        @media (min-width: 1024px) { .sidebar { width: 420px; } }
        
        .sidebar-header { padding: 2rem 1.25rem 0.5rem; flex-shrink: 0; background: var(--header-bg); }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .header-top h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.01em; }
        
        .tab-scroll { display: flex; overflow-x: auto; gap: 0.625rem; margin-bottom: 1.5rem; padding-bottom: 0.25rem; }
        .tab-btn { padding: 0.5rem 1.25rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 600; border: 1px solid var(--border-color); background: transparent; color: var(--text-muted); cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .tab-btn:hover { background: var(--bg-glass); }
        .tab-btn.active { background-color: var(--accent-btn); border-color: var(--accent-btn); color: var(--btn-text); }

        .search-box { position: relative; margin-bottom: 0.5rem; }
        .search-icon { position: absolute; left: 1.25rem; top: 1rem; color: var(--text-muted); transition: color 0.2s; }
        .search-input { width: 100%; background: var(--bg-surface); font-size: 0.9375rem; border-radius: 1rem; padding: 1rem 1rem 1rem 3rem; outline: none; color: var(--text-main); border: 1px solid var(--border-color); transition: 0.2s; }
        .search-input:focus { border-color: var(--accent-btn); }
        .search-box:focus-within .search-icon { color: var(--accent-btn); }

        .list-container { flex: 1; overflow-y: auto; padding: 0.5rem 1rem 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .list-title { font-size: 0.75rem; font-weight: 800; color: var(--text-muted); padding: 0 0.5rem; margin: 0.5rem 0 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }

        .quiz-item { display: flex; align-items: center; gap: 1rem; padding: 0.875rem; border-radius: 1.25rem; background: var(--bg-surface); cursor: pointer; transition: transform 0.15s, background 0.2s; border: 1px solid transparent; }
        .quiz-item:hover { background: var(--bg-hover); border-color: var(--border-color); }
        .quiz-item:active { transform: scale(0.97); }
        
        .quiz-icon { width: 3.5rem; height: 3.5rem; border-radius: 1rem; background: var(--bg-body); border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; flex-shrink: 0; }
        .quiz-icon i { font-size: 1.25rem; position: relative; z-index: 10; }
        .fav-indicator { position: absolute; top: 0; right: 0; width: 0.75rem; height: 0.75rem; background: var(--accent-yellow); border-bottom-left-radius: 0.5rem; z-index: 10; }
        
        .quiz-content { flex: 1; min-width: 0; padding: 0.25rem 0; }
        .quiz-title { color: var(--text-main); font-weight: 700; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 0.25rem; }
        .quiz-meta { display: flex; align-items: center; gap: 0.375rem; color: var(--text-muted); font-size: 0.8125rem; font-weight: 500; width: 100%; text-transform: uppercase; letter-spacing: 0.02em; }
        .quiz-subject { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; }
        
        .btn-delete { padding: 0.625rem; color: var(--text-muted); background: transparent; border: none; border-radius: 50%; cursor: pointer; transition: 0.2s; flex-shrink: 0; opacity: 0.6; }
        .btn-delete:hover { color: var(--accent-red); background: var(--bg-glass); opacity: 1; }
        .btn-delete:active { transform: scale(0.9); }
        
        .empty-state { text-align: center; padding: 2.5rem 0; }
        .empty-icon { width: 4rem; height: 4rem; margin: 0 auto 1rem; border-radius: 1rem; background: var(--bg-surface); display: flex; align-items: center; justify-content: center; }
        .empty-text { color: var(--text-muted); font-size: 0.875rem; font-weight: 500; }

        .practice-panel { display: none; width: 100%; flex-direction: column; position: absolute; inset: 0; background: var(--bg-body); z-index: 30; height: 100%; transition: transform 0.3s, background-color 0.3s; }
        .practice-panel.active { display: flex; }
        @media (min-width: 1024px) { .practice-panel { display: flex; flex: 1; position: relative; } }

        .practice-header { height: 72px; display: flex; align-items: center; justify-content: space-between; padding: 0 1.25rem; flex-shrink: 0; }
        @media (min-width: 1024px) { .practice-header { height: 88px; padding: 0 2rem; } }
        
        .header-left { display: flex; align-items: center; gap: 1rem; width: 100%; }
        @media (min-width: 1024px) { .header-left { width: auto; } }
        .btn-back-mobile { width: 2.5rem; height: 2.5rem; border-radius: 50%; background: transparent; display: flex; align-items: center; justify-content: center; color: var(--text-main); cursor: pointer; font-size: 1.25rem; }
        @media (min-width: 1024px) { .btn-back-mobile { display: none; } }
        
        .stat-badges { display: flex; gap: 0.75rem; }
        .badge { display: flex; align-items: center; gap: 0.375rem; padding: 0.4rem 0.875rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 700; background: var(--bg-glass); }
        .badge-xp { color: var(--accent-yellow); }
        .badge-streak { color: var(--accent-orange); }

        .btn-challenge { display: none; align-items: center; gap: 0.5rem; background: var(--bg-surface); color: var(--text-main); font-size: 0.875rem; font-weight: 700; padding: 0.625rem 1.25rem; border-radius: 9999px; border: 1px solid var(--border-color); cursor: pointer; transition: transform 0.15s; }
        .btn-challenge:active { transform: scale(0.95); }
        @media (min-width: 1024px) { .btn-challenge { display: flex; } }

        .practice-area { flex: 1; overflow-y: auto; padding: 1rem; display: flex; align-items: center; justify-content: center; padding-bottom: 2rem; }
        @media (min-width: 1024px) { .practice-area { padding: 2rem; } }

        .idle-state { text-align: center; color: var(--text-muted); display: none; flex-direction: column; align-items: center; }
        @media (min-width: 1024px) { .idle-state { display: flex; } }
        .idle-icon-wrap { width: 5rem; height: 5rem; border-radius: 1rem; background: var(--bg-surface); display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; font-size: 2rem; color: var(--accent-btn); }
        
        .card-panel { width: 100%; max-width: 42rem; background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 1.5rem; padding: 1.5rem; position: relative; overflow: hidden; }
        @media (min-width: 1024px) { .card-panel { padding: 2.5rem; } }
        
        .overview-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
        .subject-tag { background: var(--bg-glass); color: var(--accent-btn); font-size: 0.75rem; font-weight: 800; padding: 0.375rem 0.75rem; border-radius: 0.375rem; text-transform: uppercase; letter-spacing: 0.05em; display: inline-flex; align-items: center; gap: 0.375rem; }
        .btn-fav { color: var(--text-muted); font-size: 1.25rem; background: transparent; border: none; cursor: pointer; transition: 0.2s; padding: 0.5rem; margin: -0.5rem; }
        .btn-fav:hover { color: var(--accent-yellow); }
        .btn-fav:active { transform: scale(0.9); }
        .btn-fav.is-fav { color: var(--accent-yellow); }
        
        .overview-title { font-size: 1.5rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.5rem; line-height: 1.25; letter-spacing: -0.01em; }
        @media (min-width: 1024px) { .overview-title { font-size: 1.875rem; } }
        .overview-meta { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 2rem; font-weight: 500; }
        
        .overview-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; margin-bottom: 2rem; }
        @media (min-width: 1024px) { .overview-stats { gap: 1rem; } }
        .stat-card { background: var(--bg-body); padding: 1.25rem; border-radius: 1rem; border: 1px solid var(--border-color); text-align: left; }
        .stat-card-label { font-size: 0.6875rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-bottom: 0.25rem; letter-spacing: 0.05em; }
        .stat-card-val { font-size: 1.5rem; font-weight: 700; color: var(--text-main); }
        .stat-card-sub { font-size: 0.875rem; color: var(--text-muted); }

        .btn-primary { width: 100%; background: var(--accent-btn); color: var(--btn-text); font-weight: 700; padding: 1.125rem; border-radius: 100px; border: none; cursor: pointer; transition: transform 0.15s; font-size: 1.0625rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .btn-primary:active { transform: scale(0.97); }

        .quiz-wrapper { width: 100%; max-width: 48rem; display: flex; flex-direction: column; height: 100%; padding: 0.5rem 0; }
        @media (min-width: 1024px) { .quiz-wrapper { padding: 1.5rem 0; } }
        
        .progress-header { margin-bottom: 1.5rem; flex-shrink: 0; }
        @media (min-width: 1024px) { .progress-header { margin-bottom: 2rem; } }
        .progress-text { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
        .progress-track { height: 0.375rem; width: 100%; background: var(--bg-glass); border-radius: 9999px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent-btn); border-radius: 9999px; transition: width 0.5s ease-out; }

        .question-card { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 1.5rem; padding: 1.5rem; display: flex; flex-direction: column; flex: 1; overflow-y: auto; position: relative; }
        @media (min-width: 1024px) { .question-card { padding: 2rem; } }
        
        .question-text { font-size: 1.125rem; font-weight: 700; color: var(--text-main); line-height: 1.625; margin-bottom: 2rem; flex-shrink: 0; }
        @media (min-width: 1024px) { .question-text { font-size: 1.25rem; } }
        
        .options-list { display: flex; flex-direction: column; gap: 0.75rem; flex-shrink: 0; }
        .option-btn { width: 100%; text-align: left; padding: 1rem; border-radius: 1rem; background: var(--bg-body); border: 1px solid var(--border-color); display: flex; align-items: flex-start; gap: 1rem; cursor: pointer; transition: transform 0.15s, background 0.2s; color: var(--text-main); }
        .option-btn:hover:not(:disabled) { background: var(--bg-hover); }
        .option-btn:active:not(:disabled) { transform: scale(0.98); }
        
        .option-letter { width: 2rem; height: 2rem; border-radius: 50%; border: 1px solid var(--border-color); background: var(--bg-surface); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.875rem; color: var(--text-muted); transition: 0.2s; flex-shrink: 0; margin-top: 0.125rem; }
        .option-btn:hover:not(:disabled) .option-letter { color: var(--text-main); }
        .option-text { font-size: 0.9375rem; line-height: 1.6; padding-top: 0.25rem; }
        
        .option-btn.correct { background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.3); }
        .option-btn.correct .option-letter { background: var(--accent-green); border-color: var(--accent-green); color: #000; }
        .option-btn.wrong { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3); }
        .option-btn.wrong .option-letter { background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.5); color: var(--accent-red); }
        .option-btn.disabled { opacity: 0.5; cursor: not-allowed; }

        .explanation-box { display: none; flex-direction: column; gap: 0.75rem; margin-top: 2rem; padding-top: 1.5rem; flex-shrink: 0; }
        .explanation-box.active { display: flex; }
        .answer-status { display: inline-flex; align-items: center; gap: 0.375rem; font-size: 0.875rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
        .status-correct { color: var(--accent-green); }
        .status-wrong { color: var(--accent-red); }
        .expl-content { background: var(--bg-body); padding: 1rem; border-radius: 1rem; border: 1px solid var(--border-color); }
        .expl-label { font-size: 0.6875rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 0.5rem; }
        .expl-text { color: var(--text-light); font-size: 0.9375rem; line-height: 1.6; }

        .action-footer { margin-top: 1rem; display: flex; justify-content: flex-end; flex-shrink: 0; }
        .btn-next { display: none; width: 100%; background: var(--accent-btn); color: var(--btn-text); font-weight: 700; padding: 1.125rem 2rem; border-radius: 100px; border: none; cursor: pointer; transition: transform 0.15s; font-size: 1.0625rem; align-items: center; justify-content: center; gap: 0.5rem; }
        @media (min-width: 1024px) { .btn-next { width: auto; } }
        .btn-next.active { display: flex; }
        .btn-next:active { transform: scale(0.96); }

        .completion-card { width: 100%; max-width: 28rem; text-align: center; }
        .comp-icon-wrap { width: 5rem; height: 5rem; margin: 0 auto 1.5rem; border-radius: 50%; background: var(--bg-body); border: 2px solid var(--accent-btn); display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--accent-btn); }
        .comp-title { font-size: 1.75rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.5rem; letter-spacing: -0.02em; }
        .comp-sub { color: var(--text-muted); font-size: 0.9375rem; margin-bottom: 2rem; font-weight: 500; }
        
        .score-box { background: var(--bg-body); border-radius: 1.25rem; padding: 1.5rem; border: 1px solid var(--border-color); margin-bottom: 2rem; }
        .score-label { font-size: 0.6875rem; color: var(--text-muted); text-transform: uppercase; font-weight: 800; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
        .score-val { font-size: 2.5rem; font-weight: 800; color: var(--text-main); }
        .score-val span { font-size: 1.25rem; color: var(--text-muted); }
        .score-acc { font-size: 0.75rem; margin-top: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .acc-high { color: var(--accent-green); }
        .acc-low { color: var(--accent-yellow); }

        .comp-actions { display: flex; flex-direction: column; gap: 0.75rem; }
        .btn-secondary { width: 100%; padding: 1.125rem; border-radius: 100px; background: var(--bg-body); color: var(--text-main); font-weight: 700; font-size: 1.0625rem; border: 1px solid var(--border-color); cursor: pointer; transition: transform 0.15s; }
        .btn-secondary:active { transform: scale(0.97); }
        @media (min-width: 1024px) { .btn-secondary { display: none; } }

        /* Thick Outlined SVG Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--nav-bg); padding: 0.75rem 1.25rem calc(env(safe-area-inset-bottom, 0px) + 0.75rem); display: flex; justify-content: space-between; align-items: center; z-index: 50; transition: background-color 0.3s; }
        @media (min-width: 1024px) { .bottom-nav { display: none; } }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.375rem; color: var(--nav-icon); transition: color 0.2s, transform 0.15s var(--ease-out); cursor: pointer; flex: 1; text-decoration: none;}
        .nav-item.active { color: var(--accent-btn); }
        .nav-item:active { transform: scale(0.9); }
        .nav-item svg { width: 24px; height: 24px; display: block; stroke: currentColor; stroke-width: 2.25; stroke-linecap: round; stroke-linejoin: round; }
        .nav-label { font-size: 0.6875rem; font-weight: 500; letter-spacing: 0.02em; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.2s; opacity: 0; }
        .modal-overlay.active { display: flex; }
        .modal-overlay.show { opacity: 1; }
        .modal-content { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 1.5rem; padding: 1.5rem; width: 100%; max-width: 20rem; margin: 0 1rem; text-align: center; transform: scale(0.95); transition: transform 0.2s; }
        .modal-overlay.show .modal-content { transform: scale(1); }
        
        .modal-icon-wrap { width: 4rem; height: 4rem; background: rgba(248, 113, 113, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 1.5rem; color: var(--accent-red); }
        .modal-title { font-size: 1.25rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.5rem; }
        .modal-text { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1.5rem; line-height: 1.5; }
        
        .modal-actions { display: flex; gap: 0.75rem; }
        .btn-cancel { flex: 1; padding: 0.875rem; border-radius: 100px; background: var(--bg-body); color: var(--text-main); font-weight: 700; border: 1px solid var(--border-color); cursor: pointer; transition: 0.15s; }
        .btn-cancel:active { transform: scale(0.95); }
        .btn-danger-action { flex: 1; padding: 0.875rem; border-radius: 100px; background: var(--accent-red); color: white; font-weight: 700; border: none; cursor: pointer; transition: 0.15s; }
        .btn-danger-action:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="app" style="transition: opacity 0.2s ease-in-out; opacity: 1; height: 100%; width: 100%; display: flex; flex-direction: column; overflow: hidden; position: relative;">

        <div class="layout-wrapper">
            
            <aside id="libraryPanel" class="sidebar">
                <div class="sidebar-header">
                    <div class="header-top">
                        <h1>Library</h1>
                    </div>
                    
                    <div class="tab-scroll hide-scroll">
                        <button class="tab-btn active" data-filter="all">All</button>
                        <button class="tab-btn" data-filter="mcqs">MCQs</button>
                        <button class="tab-btn" data-filter="flashcards">Flashcards</button>
                        <button class="tab-btn" data-filter="favorites">Favorites</button>
                    </div>
                    
                    <div class="search-box">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="searchInput" placeholder="Search" class="search-input">
                    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, collection, getDocs, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADgcz_naQ_5tpXcpI8tSvm1b4RVLDrlaw",
            authDomain: "medxcel.firebaseapp.com",
            projectId: "medxcel",
            storageBucket: "medxcel.firebasestorage.app",
            messagingSenderId: "649180317389",
            appId: "1:649180317389:web:f6b9a7053a37853ea04b84"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Fetch Quizzes directly from Firestore instead of relying on local storage
        window.loadUserQuizzes = async function(uid) {
            try {
                const qSnap = await getDocs(collection(db, "users", uid, "quizzes"));
                let loadedQuizzes = [];
                qSnap.forEach(doc => {
                    loadedQuizzes.push(doc.data());
                });
                
                // Sort to keep newest at the end
                loadedQuizzes.sort((a,b) => a.id - b.id);
                window.quizzes = loadedQuizzes;
                
                // Back it up to user's local storage
                localStorage.setItem('medexcel_quizzes_' + uid, JSON.stringify(window.quizzes));
                
                renderLibrary();
                
            } catch(e) {
                console.error("Error loading quizzes from cloud:", e);
                // Fallback to local storage if offline
                window.quizzes = JSON.parse(localStorage.getItem('medexcel_quizzes_' + uid)) || [];
                renderLibrary();
            }
        }

        const savedUserStr = localStorage.getItem("nativeUser");
        let nativeUserObj = null;
        try { if (savedUserStr && savedUserStr !== "undefined" && savedUserStr !== "null") nativeUserObj = JSON.parse(savedUserStr); } catch(e) {}

        onAuthStateChanged(auth, async (firebaseUser) => {
            let activeUser = null;
            if (firebaseUser && !firebaseUser.isAnonymous) {
                activeUser = firebaseUser;
                localStorage.setItem("nativeUser", JSON.stringify({ email: firebaseUser.email, uid: firebaseUser.uid, displayName: firebaseUser.displayName }));
                nativeUserObj = activeUser;
            } else if (nativeUserObj && nativeUserObj.uid) {
                activeUser = nativeUserObj;
                if (!firebaseUser) { try { await signInAnonymously(auth); } catch (e) {} }
            }

            if (activeUser) {
                window.currentUser = activeUser;
                window.db = db;
                
                await window.loadUserQuizzes(activeUser.uid);
                updateStatsUI();

            } else {
                setTimeout(() => {
                    const check = localStorage.getItem("nativeUser");
                    if (!auth.currentUser && (!check || check === "null")) {
                        window.currentUser = null;
                        localStorage.removeItem("nativeUser");
                        window.location.replace("index.html");
                    }
                }, 2500);
            }
        });
    </script>

    <script>
        let userStats = JSON.parse(localStorage.getItem('medexcel_user_stats')) || {
            xp: 0, level: 1, streak: 0, lastStudyDate: null, weaknesses: {}
        };
        
        window.quizzes = []; 

        let currentQuiz = null;
        let currentQuestionIndex = 0;
        let isExamMode = false;
        let examScore = 0;
        let quizToDelete = null;

        function openPracticeMobile() {
            if (window.innerWidth < 1024) {
                document.getElementById('libraryPanel').classList.add('hidden');
                document.getElementById('practicePanel').classList.add('active');
            }
        }

        function closePracticeMobile() {
            if (window.innerWidth < 1024) {
                document.getElementById('libraryPanel').classList.remove('hidden');
                document.getElementById('practicePanel').classList.remove('active');
            }
            document.getElementById('practiceArea').innerHTML = `
                <div class="idle-state fade-in">
                    <div class="idle-icon-wrap"><i class="fas fa-layer-group"></i></div>
                    <h3 style="font-size: 1.25rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.5rem;">Ready to Study?</h3>
                    <p style="font-size: 0.9375rem; font-weight: 500;">Select a deck from your library to begin a session.</p>
                </div>
            `;
            currentQuiz = null;
        }

        function updateStatsUI() {
            const xpDisplay = document.getElementById('xpDisplay');
            const streakDisplay = document.getElementById('streakDisplay');
            
            xpDisplay.classList.remove('skeleton');
            xpDisplay.style.width = 'auto';
            xpDisplay.style.height = 'auto';
            
            streakDisplay.classList.remove('skeleton');
            streakDisplay.style.width = 'auto';
            streakDisplay.style.height = 'auto';
            
            xpDisplay.innerText = `${userStats.xp} XP`;
            streakDisplay.innerText = `${userStats.streak} Day`;
        }

        async function addXP(amount) {
            if (amount <= 0) return;
            
            userStats.xp += amount;
            localStorage.setItem('medexcel_user_stats', JSON.stringify(userStats));
            updateStatsUI();

            if (window.currentUser) {
                try {
                    const database = window.db; 
                    const { setDoc, doc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
                    
                    let dName = window.currentUser.displayName;
                    if (!dName && window.currentUser.email) dName = window.currentUser.email.split('@')[0];
                    if (!dName) dName = "User";

                    const docId = window.currentUser.email || window.currentUser.uid;

                    await setDoc(doc(database, "users", docId), {
                        uid: window.currentUser.uid, 
                        xp: userStats.xp,
                        displayName: dName 
                    }, { merge: true });
                    
                } catch (e) {
                    console.error("Failed to sync XP to cloud:", e);
                }
            }
        }

        function renderLibrary(filter = 'all', searchQuery = '') {
            const container = document.getElementById('quizContainer');
            container.innerHTML = ''; 
            
            let filtered = window.quizzes.filter(q => q.title && q.title.toLowerCase().includes(searchQuery.toLowerCase()));
            
            // Apply Filters
            if (filter === 'favorites') {
                filtered = filtered.filter(q => q.favorite);
            } else if (filter === 'mcqs') {
                filtered = filtered.filter(q => q.type && q.type.includes("Multiple"));
            } else if (filter === 'flashcards') {
                filtered = filtered.filter(q => !q.type || !q.type.includes("Multiple"));
            }
            
            if (filtered.length === 0) {
                container.innerHTML = `
                <div class="empty-state fade-in">
                    <div class="empty-icon"><i class="fas fa-box-open" style="font-size: 1.5rem; color: var(--text-muted);"></i></div>
                    <p class="empty-text">No sets found.</p>
                </div>`;
                return;
            }

            filtered.slice().reverse().forEach(quiz => {
                const qLength = quiz.questions ? quiz.questions.length : 0;
                
                // Set distinct icons and colors based on MCQ vs Flashcard
                const isMCQ = quiz.type && quiz.type.includes("Multiple");
                const iconClass = isMCQ ? "fas fa-list-ol" : "fas fa-clone";
                const iconColor = isMCQ ? "var(--accent-blue)" : "var(--accent-btn)";
                const itemLabel = isMCQ ? "Questions" : "Cards";
                
                container.innerHTML += `
                    <div class="quiz-item fade-in" onclick="loadQuizOverview(${quiz.id})">
                        <div class="quiz-icon">
                            <i class="${iconClass}" style="color: ${iconColor};"></i>
                            ${quiz.favorite ? '<div class="fav-indicator"></div>' : ''}
                        </div>
                        <div class="quiz-content">
                            <h3 class="quiz-title">${quiz.title}</h3>
                            <div class="quiz-meta">
                                <span class="quiz-subject">${quiz.subject}</span>
                                <span>•</span>
                                <span>${qLength} ${itemLabel}</span>
                            </div>
                        </div>
                        <button onclick="promptDelete(event, ${quiz.id})" class="btn-delete">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                `;
            });
        }

        function promptDelete(e, id) {
            e.stopPropagation();
            quizToDelete = id;
            openModal('deleteModal');
        }

        async function executeDelete() {
            if (quizToDelete !== null && window.currentUser) {
                try {
                    const { deleteDoc, doc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
                    await deleteDoc(doc(window.db, "users", window.currentUser.uid, "quizzes", quizToDelete.toString()));
                    
                    window.quizzes = window.quizzes.filter(q => q.id !== quizToDelete);
                    localStorage.setItem('medexcel_quizzes_' + window.currentUser.uid, JSON.stringify(window.quizzes));
                    
                    const activeTab = document.querySelector('.tab-btn.active').dataset.filter;
                    renderLibrary(activeTab, document.getElementById('searchInput').value);
                    closeModal('deleteModal');
                    
                    if (currentQuiz && currentQuiz.id === quizToDelete) { closePracticeMobile(); }
                    quizToDelete = null;
                } catch(e) { console.error("Could not delete from cloud", e); }
            }
        }

        function loadQuizOverview(id) {
            currentQuiz = window.quizzes.find(q => q.id === id);
            openPracticeMobile();
            
            const area = document.getElementById('practiceArea');
            const qLength = currentQuiz.questions ? currentQuiz.questions.length : 0;
            const bScore = currentQuiz.stats ? currentQuiz.stats.bestScore : 0;
            const attempts = currentQuiz.stats ? currentQuiz.stats.attempts : 0;
            const isMCQ = currentQuiz.type && currentQuiz.type.includes("Multiple");
            const itemLabel = isMCQ ? "Questions" : "Cards";

            area.innerHTML = `
                <div class="card-panel fade-in">
                    
                    <div class="overview-top">
                        <span class="subject-tag"><i class="fas fa-tag"></i> ${currentQuiz.subject}</span>
                        <button onclick="toggleFavoriteCurrent()" class="btn-fav ${currentQuiz.favorite ? 'is-fav' : ''}">
                            <i class="fas fa-star"></i>
                        </button>
                    </div>

                    <h2 class="overview-title">${currentQuiz.title}</h2>
                    <p class="overview-meta"><i class="fas fa-layer-group" style="margin-right: 0.375rem; color: var(--text-muted);"></i>${qLength} ${itemLabel}</p>
                    
                    <div class="overview-stats">
                        <div class="stat-card">
                            <p class="stat-card-label">Previous Best</p>
                            <p class="stat-card-val">${bScore} <span class="stat-card-sub">/ ${qLength}</span></p>
                        </div>
                        <div class="stat-card">
                            <p class="stat-card-label">Total Attempts</p>
                            <p class="stat-card-val">${attempts}</p>
                        </div>
                    </div>

                    <button onclick="startPractice(false)" class="btn-primary">
                        <i class="fas fa-play"></i> Begin Session
                    </button>
                </div>
            `;
        }

        async function toggleFavoriteCurrent() {
            if (currentQuiz && window.currentUser) {
                currentQuiz.favorite = !currentQuiz.favorite;
                
                try {
                    const { updateDoc, doc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
                    await updateDoc(doc(window.db, "users", window.currentUser.uid, "quizzes", currentQuiz.id.toString()), {
                        favorite: currentQuiz.favorite
                    });
                    localStorage.setItem('medexcel_quizzes_' + window.currentUser.uid, JSON.stringify(window.quizzes));
                } catch(e) { console.error("Cloud favorite sync failed", e); }
                
                loadQuizOverview(currentQuiz.id);
                const activeTab = document.querySelector('.tab-btn.active').dataset.filter;
                renderLibrary(activeTab, document.getElementById('searchInput').value);
            }
        }

        function startPractice(exam) {
            isExamMode = exam;
            currentQuestionIndex = 0;
            examScore = 0;
            renderQuestion();
        }

        function renderQuestion() {
            if (!currentQuiz || !currentQuiz.questions) return;
            if (currentQuestionIndex >= currentQuiz.questions.length) { finishQuiz(); return; }

            const q = currentQuiz.questions[currentQuestionIndex];
            const area = document.getElementById('practiceArea');
            const progress = ((currentQuestionIndex) / currentQuiz.questions.length) * 100;

            let optionsHtml = q.options.map((opt, idx) => `
                <button onclick="selectAnswer(${idx})" class="option-btn group">
                    <span class="option-letter">${String.fromCharCode(65 + idx)}</span>
                    <span class="option-text">${opt}</span>
                </button>
            `).join('');

            area.innerHTML = `
                <div class="quiz-wrapper fade-in">
                    
                    <div class="progress-header">
                        <div class="progress-text">
                            <span>Question ${currentQuestionIndex + 1} of ${currentQuiz.questions.length}</span>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill" style="width: ${progress}%"></div>
                        </div>
                    </div>

                    <div class="question-card">
                        <h3 class="question-text">${q.text}</h3>
                        <div class="options-list" id="optionsContainer">${optionsHtml}</div>
                        <div id="explanationArea" class="explanation-box"></div>
                    </div>

                    <div class="action-footer">
                        <button id="nextQBtn" onclick="renderQuestion()" class="btn-next">
                            ${currentQuestionIndex === currentQuiz.questions.length - 1 ? 'Finish Session' : 'Continue'} <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        function selectAnswer(selectedIndex) {
            const q = currentQuiz.questions[currentQuestionIndex];
            const isCorrect = selectedIndex === q.correct;
            const container = document.getElementById('optionsContainer');
            const explanationArea = document.getElementById('explanationArea');
            const nextBtn = document.getElementById('nextQBtn');

            if (isCorrect) { examScore++; addXP(10); }

            Array.from(container.children).forEach((btn, idx) => {
                btn.disabled = true;
                if (idx === q.correct) {
                    btn.classList.add('correct');
                } else if (idx === selectedIndex && !isCorrect) {
                    btn.classList.add('wrong');
                } else {
                    btn.classList.add('disabled');
                }
            });

            const iconClass = isCorrect ? 'fa-check-circle' : 'fa-times-circle';
            const statusClass = isCorrect ? 'status-correct' : 'status-wrong';
            const statusText = isCorrect ? 'Correct' : 'Incorrect';

            explanationArea.innerHTML = `
                <div class="answer-status ${statusClass}">
                    <i class="fas ${iconClass}"></i> ${statusText}
                </div>
                ${q.explanation ? `
                <div class="expl-content">
                    <span class="expl-label">Explanation</span>
                    <p class="expl-text">${q.explanation}</p>
                </div>` : ''}
            `;
            
            explanationArea.classList.add('active', 'fade-in');
            nextBtn.classList.add('active', 'fade-in');
            
            currentQuestionIndex++;
            
            setTimeout(() => {
                const practiceArea = document.getElementById('practiceArea');
                practiceArea.scrollTo({ top: practiceArea.scrollHeight, behavior: 'smooth' });
            }, 50);
        }

        async function finishQuiz() {
            addXP(50);
            if (!currentQuiz.stats) currentQuiz.stats = { bestScore: 0, attempts: 0, lastScore: 0 };
            
            currentQuiz.stats.attempts++;
            currentQuiz.stats.lastScore = examScore;
            if (examScore > currentQuiz.stats.bestScore) currentQuiz.stats.bestScore = examScore;
            
            if (window.currentUser) {
                try {
                    const { updateDoc, doc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
                    await updateDoc(doc(window.db, "users", window.currentUser.uid, "quizzes", currentQuiz.id.toString()), {
                        stats: currentQuiz.stats
                    });
                    localStorage.setItem('medexcel_quizzes_' + window.currentUser.uid, JSON.stringify(window.quizzes));
                } catch(e) { console.error("Cloud stats sync failed", e); }
            }
            
            const activeTab = document.querySelector('.tab-btn.active').dataset.filter;
            renderLibrary(activeTab, document.getElementById('searchInput').value);

            const area = document.getElementById('practiceArea');
            const percentage = Math.round((examScore / currentQuiz.questions.length) * 100);
            const iconType = percentage >= 80 ? 'fa-award' : 'fa-check';
            const accClass = percentage >= 80 ? 'acc-high' : 'acc-low';
            
            area.innerHTML = `
                <div class="card-panel completion-card fade-in">
                    
                    <div class="comp-icon-wrap"><i class="fas ${iconType}"></i></div>
                    
                    <h2 class="comp-title">Session Complete!</h2>
                    <p class="comp-sub">${currentQuiz.title}</p>
                    
                    <div class="score-box">
                        <p class="score-label">Final Score</p>
                        <p class="score-val">${examScore} <span>/ ${currentQuiz.questions.length}</span></p>
                        <p class="score-acc ${accClass}">Accuracy: ${percentage}%</p>
                    </div>

                    <div class="comp-actions">
                        <button onclick="startPractice(false)" class="btn-primary">
                            Retry Deck
                        </button>
                        <button onclick="closePracticeMobile()" class="btn-secondary">
                            Return to Library
                        </button>
                    </div>
                </div>
            `;
        }

        function openModal(id) { 
            const modal = document.getElementById(id);
            modal.classList.add('active');
            setTimeout(() => { modal.classList.add('show'); }, 10);
        }
        
        function closeModal(id) { 
            const modal = document.getElementById(id);
            modal.classList.remove('show');
            setTimeout(() => { modal.classList.remove('active'); }, 200);
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    renderLibrary(e.target.dataset.filter, document.getElementById('searchInput').value);
                });
            });

            document.getElementById('searchInput').addEventListener('input', (e) => {
                const activeTab = document.querySelector('.tab-btn.active').dataset.filter;
                renderLibrary(activeTab, e.target.value);
            });
        });
    </script>

    <script>
        (function initSPARouter() {
            const pageCache = new Map();
            let isNavigating = false;

            // Initialize caching for the current page
            pageCache.set(window.location.pathname + window.location.search, document.body.innerHTML);

            // Handle browser Back/Forward buttons
            window.addEventListener('popstate', (e) => {
                const url = window.location.pathname + window.location.search + window.location.hash;
                loadPage(url, false);
            });

            // Intercept all clicks on the document
            document.addEventListener('click', (e) => {
                // Traverse up to find an anchor tag
                const link = e.target.closest('a');
                if (!link || !link.href) return;

                const url = new URL(link.href);
                const currentUrl = new URL(window.location.href);

                // Ignore external links, new tabs, or anchor jumps on the same page
                if (url.origin !== currentUrl.origin || link.target === '_blank') return;
                if (url.pathname === currentUrl.pathname && url.search === currentUrl.search) return;

                e.preventDefault();
                loadPage(url.pathname + url.search + url.hash, true);
            });

            async function loadPage(url, pushHistory = true) {
                if (isNavigating) return;
                isNavigating = true;

                const appContainer = document.getElementById('app');
                if (!appContainer) {
                    window.location.href = url; // Fallback if container is missing
                    return;
                }

                // Trigger fade out
                appContainer.style.opacity = '0';

                try {
                    let html;
                    
                    // Check cache first
                    if (pageCache.has(url)) {
                        html = pageCache.get(url);
                    } else {
                        const response = await fetch(url);
                        if (!response.ok) throw new Error('Failed to fetch page');
                        html = await response.text();
                        pageCache.set(url, html); // Cache the fetched page
                    }

                    // Parse the fetched HTML
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');

                    // Wait for the fade-out transition (200ms)
                    setTimeout(() => {
                        if (pushHistory) {
                            window.history.pushState({ url }, doc.title, url);
                        }
                        document.title = doc.title;

                        // Extract the #app content if it exists in the fetched page, otherwise fallback to body
                        const fetchedApp = doc.body.querySelector('#app');
                        appContainer.innerHTML = fetchedApp ? fetchedApp.innerHTML : doc.body.innerHTML;

                        // Execute scripts safely without duplicating Firebase/Global logic
                        executePageScripts(appContainer);

                        // Trigger fade in
                        appContainer.style.opacity = '1';
                        isNavigating = false;
                    }, 200);

                } catch (error) {
                    console.warn("SPA Load Failed, falling back to standard navigation:", error);
                    window.location.href = url;
                }
            }

            function executePageScripts(container) {
                const scripts = container.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    // Safety Constraint: Do NOT re-run Firebase initializations or module scripts
                    // to prevent "Firebase App already exists" errors or duplicate global variables.
                    const scriptText = oldScript.innerHTML || "";
                    if (oldScript.src && oldScript.src.includes('firebase')) return;
                    if (scriptText.includes('initializeApp(firebaseConfig)')) return;
                    if (oldScript.type === 'module') return; 

                    // Create a new script tag to force browser execution
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    if (oldScript.innerHTML) {
                        newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    }
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
            }
        })();
    </script>
</body>
