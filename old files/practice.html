<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aurora - Study Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ease-snap: cubic-bezier(0.19, 1, 0.22, 1);
        }
        
        body { 
            -webkit-user-select: none; 
            user-select: none; 
            background-color: #050A15; /* Darker navy to match screenshot vibe */
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        
        .glass-button {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s var(--ease-snap);
        }
        .glass-button:hover { background: rgba(255, 255, 255, 0.08); }
        .glass-button:active { transform: scale(0.97); }

        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scroll::-webkit-scrollbar { display: none; }

        /* Smooth fade-in for dynamic content */
        .fade-in { animation: fadeIn 0.4s var(--ease-snap) forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Pill Tab Active State */
        .tab-btn.active {
            background-color: rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
            color: #60a5fa;
        }
    </style>
</head>
<body class="text-white h-screen flex flex-col overflow-hidden relative">

    <div class="flex-1 flex w-full h-full overflow-hidden pb-[80px] lg:pb-0 relative z-10">
        
        <aside id="libraryPanel" class="w-full lg:w-[420px] border-r border-white/5 bg-[#050A15] flex flex-col h-full z-20 transition-transform duration-300">
            
            <div class="px-5 pt-8 pb-2 flex-shrink-0">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-3xl font-extrabold tracking-tight text-white">Library</h1>
                    <button onclick="openModal('folderModal')" class="text-slate-300 hover:text-white text-2xl active:scale-95 transition-transform p-2 -mr-2">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                
                <div class="flex overflow-x-auto hide-scroll gap-2.5 mb-6 pb-1">
                    <button class="tab-btn active px-4 py-1.5 rounded-full text-sm font-medium border border-slate-700 bg-transparent text-slate-300 transition-all whitespace-nowrap" data-filter="all">Flashcard sets</button>
                    <button class="tab-btn px-4 py-1.5 rounded-full text-sm font-medium border border-slate-700 bg-transparent text-slate-300 hover:bg-slate-800 transition-all whitespace-nowrap" data-filter="folders">Folders</button>
                    <button class="tab-btn px-4 py-1.5 rounded-full text-sm font-medium border border-slate-700 bg-transparent text-slate-300 hover:bg-slate-800 transition-all whitespace-nowrap" data-filter="favorites">Favorites</button>
                </div>
                
                <div class="relative group mb-2">
                    <i class="fas fa-search absolute left-4 top-3.5 text-slate-400 group-focus-within:text-blue-400 transition-colors"></i>
                    <input type="text" id="searchInput" placeholder="Search" class="w-full bg-transparent text-sm rounded-xl py-3.5 pl-11 pr-4 outline-none focus:border-blue-500 transition-all text-slate-200 border border-slate-600 focus:bg-slate-800/50">
                </div>
            </div>

            <div class="flex-1 overflow-y-auto px-3 py-2 space-y-1 pb-6 hide-scroll">
                <h3 class="text-xs font-bold text-slate-400 px-3 mb-3 mt-2">Recent Materials</h3>
                <div id="quizContainer" class="flex flex-col gap-1">
                    </div>
            </div>
        </aside>

        <main id="practicePanel" class="hidden lg:flex w-full lg:flex-1 flex-col absolute lg:relative inset-0 bg-[#0B1120] bg-gradient-to-br from-[#0B1120] to-[#0f172a] z-30 h-full transition-transform duration-300">
            
            <header class="h-[72px] lg:h-[88px] border-b border-white/5 flex items-center justify-between px-4 lg:px-8 bg-transparent z-40 flex-shrink-0 pt-4 lg:pt-0">
                <div class="flex items-center gap-4 w-full lg:w-auto">
                    <button onclick="closePracticeMobile()" class="lg:hidden w-10 h-10 rounded-full glass-button flex items-center justify-center text-slate-400">
                        <i class="fas fa-arrow-left text-sm"></i>
                    </button>
                    
                    <div class="flex gap-3">
                        <div class="flex items-center gap-1.5 bg-yellow-500/10 border border-yellow-500/20 text-yellow-500 px-3 py-1.5 rounded-lg text-xs font-extrabold shadow-sm">
                            <i class="fas fa-bolt"></i> <span id="xpDisplay">0 XP</span>
                        </div>
                        <div class="flex items-center gap-1.5 bg-orange-500/10 border border-orange-500/20 text-orange-500 px-3 py-1.5 rounded-lg text-xs font-extrabold shadow-sm">
                            <i class="fas fa-fire"></i> <span id="streakDisplay">0 Day</span>
                        </div>
                    </div>
                </div>
                <button id="dailyChallengeBtn" class="hidden lg:flex items-center gap-2 bg-gradient-to-r from-indigo-500 to-blue-600 hover:from-indigo-400 hover:to-blue-500 text-white text-xs font-bold px-5 py-2.5 rounded-xl shadow-lg shadow-indigo-900/30 transition-transform active:scale-95">
                    <i class="fas fa-star text-yellow-300"></i> Daily Challenge
                </button>
            </header>

            <div id="practiceArea" class="flex-1 overflow-y-auto p-4 lg:p-8 flex items-center justify-center pb-8 hide-scroll">
                <div class="text-center text-slate-500 hidden lg:flex flex-col items-center">
                    <div class="w-24 h-24 rounded-2xl bg-slate-800/50 border border-slate-700 flex items-center justify-center mb-6 shadow-inner transform rotate-3">
                        <i class="fas fa-layer-group text-4xl text-blue-500/50"></i>
                    </div>
                    <h3 class="text-lg font-bold text-slate-300 mb-2">Ready to Study?</h3>
                    <p class="text-sm font-medium tracking-wide">Select a deck from your library to begin a session.</p>
                </div>
            </div>
        </main>
    </div>

    <nav class="fixed lg:hidden bottom-0 left-0 right-0 bg-[#050A15]/95 backdrop-blur-lg border-t border-slate-800 px-6 pt-3 pb-8 flex justify-between items-center z-50 transform-gpu">
        <a href="homepage1.html" class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-slate-300 transition-colors">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px] font-medium">Home</span>
        </a>
        <a href="create.html" class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-slate-300 transition-colors">
            <i class="fas fa-plus text-xl"></i>
            <span class="text-[10px] font-medium">Create</span>
        </a>
        <a href="study.html" id="libraryBtn" class="flex flex-col items-center gap-1.5 text-white transition-colors">
            <i class="fas fa-folder text-xl"></i>
            <span class="text-[10px] font-bold">Library</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-slate-300 transition-colors">
            <i class="fas fa-search-plus text-xl"></i>
            <span class="text-[10px] font-medium">Free trial</span>
        </a>
    </nav>

    <div id="deleteModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden items-center justify-center z-[100] transition-opacity">
        <div class="bg-[#1e293b] border border-slate-700 rounded-3xl p-6 lg:p-8 max-w-[320px] w-full mx-4 text-center transform scale-95 transition-transform shadow-2xl">
            <div class="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-red-500/20">
                <i class="fas fa-exclamation-triangle text-2xl text-red-500"></i>
            </div>
            <h3 class="text-xl font-bold text-white mb-2">Delete Deck?</h3>
            <p class="text-slate-400 text-sm mb-6">This material will be permanently removed from your library.</p>
            <div class="flex gap-3">
                <button onclick="closeModal('deleteModal')" class="flex-1 py-3.5 rounded-xl bg-slate-800 text-slate-300 font-bold active:scale-95 transition-transform">Cancel</button>
                <button id="confirmDeleteBtn" onclick="executeDelete()" class="flex-1 py-3.5 rounded-xl bg-red-600 hover:bg-red-500 text-white font-bold active:scale-95 transition-transform shadow-lg shadow-red-900/30">Delete</button>
            </div>
        </div>
    </div>

    <div id="folderModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden items-center justify-center z-[100] transition-opacity">
        <div class="bg-[#1e293b] border border-slate-700 rounded-3xl p-6 lg:p-8 max-w-[320px] w-full mx-4 transform scale-95 transition-transform shadow-2xl">
            <h3 class="text-xl font-bold text-white mb-4">New Folder</h3>
            <input type="text" id="newFolderName" placeholder="e.g. Pathology" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3.5 text-white focus:border-blue-500 outline-none mb-6 text-sm placeholder-slate-500">
            <div class="flex gap-3">
                <button onclick="closeModal('folderModal')" class="flex-1 py-3.5 rounded-xl bg-slate-800 text-slate-300 font-bold active:scale-95 transition-transform">Cancel</button>
                <button id="createFolderBtn" onclick="closeModal('folderModal')" class="flex-1 py-3.5 rounded-xl bg-blue-600 text-white font-bold active:scale-95 transition-transform shadow-lg shadow-blue-900/30">Create</button>
            </div>
        </div>
    </div>

    <script>
        // Data Structures
        let userStats = JSON.parse(localStorage.getItem('medexcel_user_stats')) || {
            xp: 0, level: 1, streak: 0, lastStudyDate: null, weaknesses: {}
        };
        let quizzes = JSON.parse(localStorage.getItem('medexcel_quizzes')) || [];
        
        // Remove Placeholder Bug logic
        const originalLength = quizzes.length;
        quizzes = quizzes.filter(q => q.title && !q.title.toLowerCase().includes('autonomic system'));
        if (quizzes.length !== originalLength) {
            localStorage.setItem('medexcel_quizzes', JSON.stringify(quizzes));
        }

        let currentQuiz = null;
        let currentQuestionIndex = 0;
        let isExamMode = false;
        let examScore = 0;
        let quizToDelete = null;

        // Mobile View Navigation
        function openPracticeMobile() {
            if (window.innerWidth < 1024) {
                document.getElementById('libraryPanel').classList.add('hidden');
                document.getElementById('practicePanel').classList.remove('hidden');
                document.getElementById('practicePanel').classList.add('flex');
            }
        }

        function closePracticeMobile() {
            if (window.innerWidth < 1024) {
                document.getElementById('libraryPanel').classList.remove('hidden');
                document.getElementById('practicePanel').classList.add('hidden');
                document.getElementById('practicePanel').classList.remove('flex');
            }
            document.getElementById('practiceArea').innerHTML = `
                <div class="text-center text-slate-500 hidden lg:flex flex-col items-center">
                    <div class="w-24 h-24 rounded-2xl bg-slate-800/50 border border-slate-700 flex items-center justify-center mb-6 shadow-inner transform rotate-3">
                        <i class="fas fa-layer-group text-4xl text-blue-500/50"></i>
                    </div>
                    <h3 class="text-lg font-bold text-slate-300 mb-2">Ready to Study?</h3>
                    <p class="text-sm font-medium tracking-wide">Select a deck from your library to begin a session.</p>
                </div>
            `;
            currentQuiz = null;
        }

        function updateStatsUI() {
            document.getElementById('xpDisplay').innerText = `${userStats.xp} XP`;
            document.getElementById('streakDisplay').innerText = `${userStats.streak} Day`;
        }

        function addXP(amount) {
            userStats.xp += amount;
            localStorage.setItem('medexcel_user_stats', JSON.stringify(userStats));
            updateStatsUI();
        }

        function renderLibrary(filter = 'all', searchQuery = '') {
            const container = document.getElementById('quizContainer');
            container.innerHTML = '';
            
            let filtered = quizzes.filter(q => q.title.toLowerCase().includes(searchQuery.toLowerCase()));
            if (filter === 'favorites') filtered = filtered.filter(q => q.favorite);
            
            if (filtered.length === 0) {
                container.innerHTML = `
                <div class="text-center py-10 fade-in">
                    <div class="w-16 h-16 mx-auto rounded-xl bg-slate-800/50 flex items-center justify-center mb-4 transform -rotate-6">
                        <i class="fas fa-box-open text-2xl text-slate-500"></i>
                    </div>
                    <p class="text-slate-400 text-sm font-medium">No sets found.</p>
                </div>`;
                return;
            }

            // Reverse to show newest first
            filtered.slice().reverse().forEach(quiz => {
                const qLength = quiz.questions ? quiz.questions.length : 0;
                
                container.innerHTML += `
                    <div class="flex items-center gap-4 p-3 hover:bg-slate-800/60 rounded-2xl cursor-pointer transition-colors fade-in border border-transparent hover:border-slate-700" onclick="loadQuizOverview(${quiz.id})">
                        
                        <div class="w-[52px] h-[52px] rounded-xl bg-slate-800 border border-slate-700 flex items-center justify-center flex-shrink-0 relative overflow-hidden">
                            <i class="fas fa-mobile-alt text-blue-400 text-xl transform -rotate-12"></i>
                            <div class="absolute inset-0 bg-blue-500/5"></div>
                            ${quiz.favorite ? '<div class="absolute top-0 right-0 w-3 h-3 bg-yellow-500 rounded-bl-lg z-10 shadow-sm"></div>' : ''}
                        </div>
                        
                        <div class="flex-1 min-w-0 py-1">
                            <h3 class="text-slate-100 font-bold text-[15px] truncate leading-tight">${quiz.title}</h3>
                            <div class="flex items-center gap-1 mt-1 text-slate-400 text-xs font-medium truncate w-full">
                                <span class="truncate max-w-[100px]">${quiz.subject}</span>
                                <span class="px-1">•</span>
                                <span>${qLength} terms</span>
                            </div>
                        </div>

                        <button onclick="promptDelete(event, ${quiz.id})" class="p-2.5 text-slate-600 hover:text-red-400 transition-colors flex-shrink-0 active:scale-90 rounded-full hover:bg-slate-800">
                            <i class="fas fa-trash-alt text-sm"></i>
                        </button>
                    </div>
                `;
            });
        }

        function promptDelete(e, id) {
            e.stopPropagation();
            quizToDelete = id;
            openModal('deleteModal');
        }

        function executeDelete() {
            if (quizToDelete !== null) {
                quizzes = quizzes.filter(q => q.id !== quizToDelete);
                localStorage.setItem('medexcel_quizzes', JSON.stringify(quizzes));
                
                const activeTab = document.querySelector('.tab-btn.active').dataset.filter;
                renderLibrary(activeTab, document.getElementById('searchInput').value);
                closeModal('deleteModal');
                
                if (currentQuiz && currentQuiz.id === quizToDelete) {
                    closePracticeMobile(); 
                }
                quizToDelete = null;
            }
        }

        function loadQuizOverview(id) {
            currentQuiz = quizzes.find(q => q.id === id);
            openPracticeMobile();
            
            const area = document.getElementById('practiceArea');
            const qLength = currentQuiz.questions ? currentQuiz.questions.length : 0;
            const bScore = currentQuiz.stats ? currentQuiz.stats.bestScore : 0;
            const attempts = currentQuiz.stats ? currentQuiz.stats.attempts : 0;

            area.innerHTML = `
                <div class="w-full max-w-2xl glass-panel rounded-3xl p-6 lg:p-10 shadow-2xl relative overflow-hidden fade-in">
                    <div class="absolute -top-24 -right-24 w-64 h-64 bg-blue-600/10 rounded-full blur-3xl pointer-events-none"></div>
                    
                    <div class="flex justify-between items-start mb-4">
                        <span class="bg-blue-500/20 text-blue-400 text-[10px] lg:text-xs font-extrabold px-3 py-1.5 rounded border border-blue-500/30 uppercase tracking-widest inline-flex items-center gap-1.5"><i class="fas fa-tag"></i> ${currentQuiz.subject}</span>
                        <button onclick="toggleFavoriteCurrent()" class="text-${currentQuiz.favorite ? 'yellow-500' : 'slate-500'} hover:text-yellow-400 text-xl transition-colors active:scale-90 p-2 -m-2">
                            <i class="fas fa-star"></i>
                        </button>
                    </div>

                    <h2 class="text-2xl lg:text-3xl font-bold text-white mb-2 leading-tight">${currentQuiz.title}</h2>
                    <p class="text-slate-400 text-sm mb-8 font-medium"><i class="fas fa-layer-group mr-2 text-slate-500"></i>${qLength} Study Items</p>
                    
                    <div class="grid grid-cols-2 gap-3 lg:gap-4 mb-8">
                        <div class="bg-slate-900/40 p-5 rounded-2xl border border-white/5 text-center lg:text-left">
                            <p class="text-[10px] text-slate-500 uppercase font-bold mb-1 tracking-widest">Previous Best</p>
                            <p class="text-3xl font-bold text-slate-100">${bScore} <span class="text-sm text-slate-500">/ ${qLength}</span></p>
                        </div>
                        <div class="bg-slate-900/40 p-5 rounded-2xl border border-white/5 text-center lg:text-left">
                            <p class="text-[10px] text-slate-500 uppercase font-bold mb-1 tracking-widest">Total Attempts</p>
                            <p class="text-3xl font-bold text-slate-100">${attempts}</p>
                        </div>
                    </div>

                    <button onclick="startPractice(false)" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl active:scale-[0.98] transition-all shadow-lg shadow-blue-900/20 uppercase tracking-wider text-sm">
                        <i class="fas fa-play mr-2"></i> Begin Session
                    </button>
                </div>
            `;
        }

        function toggleFavoriteCurrent() {
            if (currentQuiz) {
                currentQuiz.favorite = !currentQuiz.favorite;
                localStorage.setItem('medexcel_quizzes', JSON.stringify(quizzes));
                
                // Refresh overview to update star
                loadQuizOverview(currentQuiz.id);
                
                // Refresh library list
                const activeTab = document.querySelector('.tab-btn.active').dataset.filter;
                renderLibrary(activeTab, document.getElementById('searchInput').value);
            }
        }

        function startPractice(exam) {
            isExamMode = exam;
            currentQuestionIndex = 0;
            examScore = 0;
            renderQuestion();
        }

        function renderQuestion() {
            if (!currentQuiz || !currentQuiz.questions) return;
            if (currentQuestionIndex >= currentQuiz.questions.length) {
                finishQuiz();
                return;
            }

            const q = currentQuiz.questions[currentQuestionIndex];
            const area = document.getElementById('practiceArea');
            const progress = ((currentQuestionIndex) / currentQuiz.questions.length) * 100;

            let optionsHtml = q.options.map((opt, idx) => `
                <button onclick="selectAnswer(${idx})" class="w-full text-left p-4 rounded-xl bg-slate-800/50 border border-slate-700/50 hover:bg-slate-700/50 hover:border-slate-600 active:scale-[0.99] transition-all flex items-start gap-4 cursor-pointer group option-btn">
                    <span class="w-8 h-8 rounded border border-slate-600 bg-slate-900/50 flex items-center justify-center font-bold text-sm text-slate-400 group-hover:text-white transition-colors flex-shrink-0 mt-0.5">
                        ${String.fromCharCode(65 + idx)}
                    </span>
                    <span class="text-slate-200 text-sm md:text-base leading-relaxed pt-1">${opt}</span>
                </button>
            `).join('');

            area.innerHTML = `
                <div class="w-full max-w-3xl flex flex-col h-full py-2 lg:py-6 fade-in">
                    
                    <div class="mb-6 lg:mb-8 flex-shrink-0">
                        <div class="flex justify-between text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">
                            <span>Question ${currentQuestionIndex + 1} of ${currentQuiz.questions.length}</span>
                        </div>
                        <div class="h-1.5 w-full bg-slate-800/50 rounded-full overflow-hidden shadow-inner">
                            <div class="h-full bg-blue-500 rounded-full shadow-[0_0_10px_rgba(59,130,246,0.5)] transition-all duration-500 ease-out" style="width: ${progress}%"></div>
                        </div>
                    </div>

                    <div class="glass-panel rounded-3xl p-6 lg:p-8 flex-1 overflow-y-auto hide-scroll flex flex-col shadow-2xl relative">
                        <h3 class="text-lg lg:text-xl font-bold text-white leading-relaxed mb-8 flex-shrink-0">${q.text}</h3>
                        
                        <div class="space-y-3 flex-shrink-0" id="optionsContainer">${optionsHtml}</div>
                        
                        <div id="explanationArea" class="hidden flex-shrink-0 mt-8 pt-6 border-t border-white/5 flex-col gap-3"></div>
                    </div>

                    <div class="mt-4 flex justify-end flex-shrink-0">
                        <button id="nextQBtn" onclick="renderQuestion()" class="hidden w-full lg:w-auto bg-blue-600 text-white font-bold py-3.5 px-8 rounded-xl active:scale-95 transition-all uppercase tracking-wider text-sm shadow-lg shadow-blue-900/20">
                            ${currentQuestionIndex === currentQuiz.questions.length - 1 ? 'Finish Session' : 'Continue'} <i class="fas fa-arrow-right ml-2"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        function selectAnswer(selectedIndex) {
            const q = currentQuiz.questions[currentQuestionIndex];
            const isCorrect = selectedIndex === q.correct;
            const container = document.getElementById('optionsContainer');
            const explanationArea = document.getElementById('explanationArea');
            const nextBtn = document.getElementById('nextQBtn');

            if (isCorrect) {
                examScore++;
                addXP(10);
            }

            // Disable and style all buttons
            Array.from(container.children).forEach((btn, idx) => {
                btn.disabled = true;
                btn.classList.remove('hover:bg-slate-700/50', 'hover:border-slate-600', 'cursor-pointer');
                
                const letterBox = btn.querySelector('span:first-child');
                
                if (idx === q.correct) {
                    btn.classList.remove('bg-slate-800/50', 'border-slate-700/50');
                    btn.classList.add('bg-emerald-500/10', 'border-emerald-500/30', 'ring-1', 'ring-emerald-500/20');
                    letterBox.classList.remove('bg-slate-900/50', 'border-slate-600', 'text-slate-400');
                    letterBox.classList.add('bg-emerald-500', 'border-emerald-500', 'text-[#0f172a]');
                } else if (idx === selectedIndex && !isCorrect) {
                    btn.classList.remove('bg-slate-800/50', 'border-slate-700/50');
                    btn.classList.add('bg-red-500/10', 'border-red-500/30');
                    letterBox.classList.remove('bg-slate-900/50', 'border-slate-600', 'text-slate-400');
                    letterBox.classList.add('bg-red-500/20', 'border-red-500/50', 'text-red-400');
                } else {
                    btn.classList.add('opacity-40');
                }
            });

            // Populate and show explanation
            explanationArea.innerHTML = `
                <div class="inline-flex items-center gap-1.5 ${isCorrect ? 'text-emerald-400' : 'text-red-400'} text-xs font-bold uppercase tracking-wider mb-1">
                    <i class="fas ${isCorrect ? 'fa-check-circle' : 'fa-times-circle'} text-base"></i> ${isCorrect ? 'Correct' : 'Incorrect'}
                </div>
                ${q.explanation ? `
                <div class="bg-[#0B1120]/50 p-4 rounded-xl border border-white/5">
                    <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest block mb-1.5">Explanation</span>
                    <p class="text-slate-300 text-sm leading-relaxed">${q.explanation}</p>
                </div>` : ''}
            `;
            
            explanationArea.classList.remove('hidden');
            explanationArea.classList.add('flex', 'fade-in');
            
            nextBtn.classList.remove('hidden');
            nextBtn.classList.add('fade-in');
            
            currentQuestionIndex++;
            
            setTimeout(() => {
                const practiceArea = document.getElementById('practiceArea');
                practiceArea.scrollTo({ top: practiceArea.scrollHeight, behavior: 'smooth' });
            }, 50);
        }

        function finishQuiz() {
            addXP(50);
            if (!currentQuiz.stats) currentQuiz.stats = { bestScore: 0, attempts: 0, lastScore: 0 };
            
            currentQuiz.stats.attempts++;
            currentQuiz.stats.lastScore = examScore;
            if (examScore > currentQuiz.stats.bestScore) currentQuiz.stats.bestScore = examScore;
            
            localStorage.setItem('medexcel_quizzes', JSON.stringify(quizzes));
            
            const activeTab = document.querySelector('.tab-btn.active').dataset.filter;
            renderLibrary(activeTab, document.getElementById('searchInput').value);

            const area = document.getElementById('practiceArea');
            const percentage = Math.round((examScore / currentQuiz.questions.length) * 100);
            
            area.innerHTML = `
                <div class="w-full max-w-md glass-panel rounded-3xl p-8 text-center relative overflow-hidden fade-in">
                    <div class="absolute -top-20 -left-20 w-48 h-48 bg-blue-500/20 rounded-full blur-3xl pointer-events-none"></div>
                    
                    <div class="w-20 h-20 mx-auto rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center mb-6 shadow-lg shadow-blue-500/30 relative z-10">
                        <i class="fas ${percentage >= 80 ? 'fa-award' : 'fa-check'} text-3xl text-white"></i>
                    </div>
                    
                    <h2 class="text-2xl font-bold text-white mb-2 relative z-10">Session Complete!</h2>
                    <p class="text-slate-400 text-sm mb-8 font-medium line-clamp-1 relative z-10">${currentQuiz.title}</p>
                    
                    <div class="bg-[#0B1120]/60 rounded-2xl p-6 border border-white/5 mb-8 relative z-10">
                        <p class="text-[10px] text-slate-500 uppercase font-extrabold tracking-widest mb-2">Final Score</p>
                        <p class="text-4xl font-extrabold text-white">${examScore} <span class="text-lg text-slate-500 font-bold">/ ${currentQuiz.questions.length}</span></p>
                        <p class="text-[11px] mt-3 ${percentage >= 80 ? 'text-emerald-400' : 'text-yellow-500'} font-bold uppercase tracking-wider">Accuracy: ${percentage}%</p>
                    </div>

                    <div class="flex flex-col gap-3 relative z-10">
                        <button onclick="startPractice(false)" class="w-full py-4 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-bold text-sm uppercase tracking-wider active:scale-95 transition-all shadow-lg shadow-blue-900/20">
                            Retry Deck
                        </button>
                        <button onclick="closePracticeMobile()" class="w-full py-4 rounded-xl bg-slate-800/50 hover:bg-slate-700/50 text-slate-300 font-bold text-sm uppercase tracking-wider active:scale-95 transition-all border border-slate-700/50 lg:hidden">
                            Return to Library
                        </button>
                    </div>
                </div>
            `;
        }

        function openModal(id) { 
            const modal = document.getElementById(id);
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => { 
                modal.classList.remove('opacity-0');
                modal.firstElementChild.classList.remove('scale-95'); 
            }, 10);
        }
        
        function closeModal(id) { 
            const modal = document.getElementById(id);
            modal.classList.add('opacity-0');
            modal.firstElementChild.classList.add('scale-95');
            setTimeout(() => { 
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 200);
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateStatsUI();
            renderLibrary();

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.tab-btn').forEach(b => {
                        b.classList.remove('active', 'border-slate-700', 'border-blue-500', 'bg-blue-500/10', 'text-blue-400');
                        b.classList.add('border-slate-700', 'bg-transparent', 'text-slate-300');
                    });
                    e.target.classList.remove('border-slate-700', 'bg-transparent', 'text-slate-300');
                    e.target.classList.add('active'); // CSS handles active state colors
                    renderLibrary(e.target.dataset.filter, document.getElementById('searchInput').value);
                });
            });

            document.getElementById('searchInput').addEventListener('input', (e) => {
                const activeTab = document.querySelector('.tab-btn.active').dataset.filter;
                renderLibrary(activeTab, e.target.value);
            });
        });
    </script>
</body>
</html>
