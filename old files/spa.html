<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aurora - SPA</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.13.0/lottie_light.min.js"></script>
    
    <script>
        (function() {
            const savedTheme = localStorage.getItem('medexcel_theme');
            if (savedTheme === 'light') { document.documentElement.classList.add('light-mode'); }
        })();
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } };
    </script>
    
    <style>
        :root { 
            --bg-body: #09090b; --bg-surface: #121216; --bg-hover: #1a1a20; --text-main: #ffffff; 
            --text-muted: #94a3b8; --accent-btn: #a78bfa; --nav-bg: #09090b; --nav-icon: #71717a;
            --border-color: rgba(255, 255, 255, 0.05); --border-glass: rgba(255, 255, 255, 0.06);
            --header-bg: rgba(9, 9, 11, 0.95); --day-circle: #27272a; --accent-orange: #f97316;
            --accent-green: #34d399; --btn-text: #000000; --ease-snap: cubic-bezier(0.19, 1, 0.22, 1);
            --radius-btn: 100px; --radius-md: 16px; --radius-card: 24px;
        }
        .light-mode { 
            --bg-body: #f1f5f9; --bg-surface: #ffffff; --bg-hover: #f8fafc; --text-main: #0f172a; 
            --text-muted: #64748b; --accent-btn: #8b5cf6; --nav-bg: #ffffff; --nav-icon: #94a3b8;
            --border-color: rgba(0, 0, 0, 0.06); --border-glass: rgba(0, 0, 0, 0.06);
            --header-bg: rgba(241, 245, 249, 0.95); --day-circle: #e2e8f0; --accent-orange: #ea580c;
            --accent-green: #10b981; --btn-text: #ffffff;
        }
        body { background-color: var(--bg-body); color: var(--text-main); transition: 0.3s ease; }
        
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scroll::-webkit-scrollbar { display: none; }

        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-body); 
            padding: 0.75rem 1.25rem calc(env(safe-area-inset-bottom, 0px) + 0.75rem); 
            display: flex; justify-content: space-between; align-items: center; z-index: 50; 
        }
        .nav-item { 
            display: flex; flex-direction: column; align-items: center; gap: 0.375rem;
            color: var(--nav-icon); cursor: pointer; flex: 1; text-decoration: none;
        }
        .nav-item.active { color: var(--accent-btn); }
        .nav-item svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2.25; fill: none; }
        
        .skeleton {
            background: linear-gradient(90deg, rgba(128, 128, 128, 0.1) 25%, rgba(128, 128, 128, 0.2) 50%, rgba(128, 128, 128, 0.1) 75%);
            background-size: 200% 100%; animation: shimmer 1.5s infinite linear; color: transparent !important; border-color: transparent !important; pointer-events: none;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Home Specific Styles */
        .header-bar { padding: 1.5rem 1.25rem 1rem; display: flex; align-items: center; justify-content: space-between; z-index: 10; position: sticky; top: 0; background: var(--header-bg); backdrop-filter: blur(16px); }
        .greeting-title { font-size: 1.15rem; font-weight: 700; flex: 1; margin: 0; display: flex; align-items: center; }
        .streak-badge { display: flex; align-items: center; gap: 0.375rem; padding: 0.4rem 0.875rem; border-radius: 9999px; background: rgba(249, 115, 22, 0.08); border: 1px solid rgba(249, 115, 22, 0.15); color: var(--accent-orange); font-size: 0.9375rem; font-weight: 700; cursor: pointer; }
        .main-content { padding: 0.5rem 1.25rem 2rem; display: flex; flex-direction: column; gap: 1.75rem; }
        .section-title { font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem;}
        
        .promo-carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 1rem; }
        .promo-consultation-card { min-width: 100%; scroll-snap-align: center; background: #4A1D96; border-radius: 1.5rem; padding: 1.5rem; display: flex; align-items: center; position: relative; overflow: hidden; min-height: 160px; color: white;}
        .promo-bg-shape { position: absolute; top: 0; right: 0; bottom: 0; left: 40%; background: #6D28D9; transform: skewX(-15deg); z-index: 1; }
        .promo-text-area { position: relative; z-index: 2; width: 60%; }
        .promo-doctor-img { position: absolute; bottom: 0; right: -5%; height: 120%; max-height: 190px; z-index: 2; pointer-events: none; }
        .promo-dots-container { display: flex; justify-content: center; gap: 6px; margin-top: 0.75rem; }
        .promo-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border-glass); transition: all 0.3s; }
        .promo-dot.active { width: 16px; border-radius: 100px; background: var(--accent-btn); }
        
        .continue-card { padding: 1.25rem; display: flex; align-items: center; justify-content: space-between; background: var(--bg-surface); border-radius: var(--radius-md); border: 1px solid var(--border-glass); text-decoration: none; }
        .promo-banner { display: flex; gap: 1rem; padding: 1.25rem; background: rgba(139, 92, 246, 0.05); border: 1px solid rgba(139, 92, 246, 0.1); border-radius: var(--radius-card); }
        
        .ok-backdrop { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; z-index: 99999; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); transition: opacity 0.3s;}
        .ok-backdrop.active { display: flex; }
        .streak-dialog { width: 100%; max-width: 100%; background: var(--bg-surface); border-radius: var(--radius-card) var(--radius-card) 0 0; padding: 2rem 1.5rem calc(env(safe-area-inset-bottom, 0px) + 2.5rem); transform: translateY(100%); transition: transform 0.4s var(--ease-snap); text-align: center; display: flex; flex-direction: column; align-items: center; position: absolute; bottom: 0;}
        .ok-backdrop.active .streak-dialog { transform: translateY(0); }
        .day-circle { width: 36px; height: 36px; border-radius: 50%; background: var(--day-circle); display: flex; align-items: center; justify-content: center; font-size: 0.875rem; font-weight: 600; color: #71717a; }
        .day-circle.done { background: transparent; color: var(--accent-orange); font-size: 1.125rem; }
        .day-circle.active { background: rgba(249, 115, 22, 0.1); color: var(--accent-orange); }
        .btn-checkin { width: 100%; padding: 1.125rem; font-weight: 600; font-size: 1.0625rem; background: var(--accent-btn); color: var(--btn-text); border-radius: var(--radius-btn); }
        
        .group-container { background: var(--bg-surface); border-radius: 1.25rem; margin-bottom: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .list-item { display: flex; align-items: center; justify-content: space-between; padding: 1.125rem 1.25rem; cursor: pointer; border-bottom: 1px solid var(--border-color); }
        .list-item:last-child { border-bottom: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden relative">

    <div id="app-root" class="flex-1 overflow-y-auto hide-scroll pb-24 w-full h-full relative"></div>

    <nav class="bottom-nav" id="mainNav">
        <a href="#/home" class="nav-item" data-path="/home">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-4v-8h-2v8H5a2 2 0 0 1-2-2z"></path></svg>

        <a href="#/study" class="nav-item" data-path="/study">

            <span class="text-[11px] font-medium mt-1">Library</span>

        </a>

            <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>

            <span class="text-[11px] font-medium mt-1">Profile</span>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, query, orderBy, limit, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyADgcz_naQ_5tpXcpI8tSvm1b4RVLDrlaw",
        authDomain: "medxcel.firebaseapp.com",
        projectId: "medxcel",
        storageBucket: "medxcel.firebasestorage.app",
        messagingSenderId: "649180317389",
        appId: "1:649180317389:web:f6b9a7053a37853ea04b84"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let currentUser = null;
    let windowHomeRotator = null; 
    
    onAuthStateChanged(auth, async (user) => {
        if (!user && localStorage.getItem("nativeUser")) {
            try { await signInAnonymously(auth); } catch (e) {}
        } else {
            currentUser = user ? user : null;
            if (window.location.hash === '#/home' || window.location.hash === '' || window.location.hash === '#/study') handleRouting();
        }
    });

    // 2. HOME COMPONENT
    const HomeView = {
        render: () => {
            return `
                <div id="streakModalBackdrop" class="ok-backdrop" aria-hidden="true">
                    <div class="streak-dialog" id="streakDialog">
                        <div id="modalStreakLottie" style="width: 80px; height: 80px; margin-bottom: 0.5rem;"></div>
                        <div style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.25rem; letter-spacing: -0.02em;">Day <span id="modalDayCount">1</span></div>
                        <h3 class="streak-dialog-title" style="margin-bottom: 1.5rem; color: var(--text-muted);">Keep the fire alive<br>check in today!</h3>
                        <div class="flex justify-center gap-2 w-full mb-6" id="calendarRow"></div>
                        <button id="closeStreakModal" class="btn-checkin">Check in today!</button>
                    </div>
                </div>

                <header class="header-bar">
                    <h1 id="greetingTitle" class="greeting-title skeleton" style="width: 140px; height: 22px; border-radius: 6px;"></h1>
                    <div class="streak-badge" id="headerStreakBadge">
                        <i id="headerFireIcon" class="fas fa-fire"></i>
                        <span id="headerStreakDisplay" class="skeleton" style="width: 16px; height: 18px; border-radius: 4px; display: inline-block;"></span>
                    </div>
                </header>

                <main class="main-content">
                    <div class="promo-carousel-wrapper">
                        <div class="promo-carousel hide-scroll" id="promoCarousel">
                            <a href="#/study" class="promo-consultation-card">
                                <div class="promo-bg-shape"></div>
                                <div class="promo-text-area">
                                    <div class="flex items-center gap-1 mb-1">
                                        <span class="text-3xl font-bold">2x</span>
                                        <span class="text-[0.65rem] font-bold leading-tight">DAILY<br>REWARD</span>
                                    </div>
                                    <p class="text-sm mb-4 opacity-90">Complete 20 flashcards today to earn double XP!</p>
                                    <div class="bg-white/20 border border-white/10 px-4 py-1.5 rounded-full text-xs font-bold inline-block">Start Challenge</div>
                                </div>
                                <div class="promo-doctor-img flex items-center text-[5.5rem] opacity-80"><i class="fas fa-bolt"></i></div>
                            </a>
                            <a href="#/create" class="promo-consultation-card" style="background:#0f766e;">
                                <div class="promo-bg-shape" style="background:#14b8a6;"></div>
                                <div class="promo-text-area">
                                    <div class="flex items-center gap-1 mb-1">
                                        <span class="text-3xl font-bold">AI</span>
                                        <span class="text-[0.65rem] font-bold leading-tight">DECK<br>BUILDER</span>
                                    </div>
                                    <p class="text-sm mb-4 opacity-90">Turn your notes into study decks in seconds.</p>
                                    <div class="bg-white/20 border border-white/10 px-4 py-1.5 rounded-full text-xs font-bold inline-block">Create Now</div>
                                </div>
                                <div class="promo-doctor-img flex items-center text-[5rem] opacity-80"><i class="fas fa-magic"></i></div>
                            </a>
                        </div>
                        <div class="promo-dots-container" id="carouselIndicators">
                            <div class="promo-dot active"></div><div class="promo-dot"></div>
                        </div>
                    </div>

                    <div class="flex flex-col gap-3">
                        <h2 class="section-title">Continue Studying</h2>
                        <a href="#/study" class="continue-card">
                            <div class="flex items-center gap-4 flex-1 min-w-0">
                                <div id="continueIconBox" class="w-12 h-12 rounded-full bg-blue-500/10 text-blue-500 flex items-center justify-center text-xl shrink-0 skeleton">
                                    <i class="fas fa-layer-group"></i>
                                </div>
                                <div class="flex flex-col justify-center flex-1 min-w-0">
                                    <h3 id="continueTitle" class="font-bold text-[var(--text-main)] truncate skeleton" style="width:100px;height:16px;"></h3>
                                    <p class="text-xs font-medium text-[var(--text-muted)] uppercase mt-1 skeleton" id="continueMeta" style="width:60px;height:12px;"></p>
                                </div>
                            </div>
                            <div class="bg-blue-500/15 text-blue-500 text-xs font-bold px-2 py-1.5 rounded-md ml-3 skeleton" id="continueProgressText" style="width:40px;height:24px;"></div>
                        </a>
                    </div>

                    <div class="flex flex-col gap-3">
                        <h2 class="section-title">Weekly Target</h2>
                        <div class="promo-banner">
                            <div class="w-10 h-10 rounded-full bg-purple-500/15 text-purple-400 flex items-center justify-center text-xl shrink-0"><i class="fas fa-bullseye"></i></div>
                            <div>
                                <h4 id="targetTitle" class="text-sm font-bold text-[var(--text-main)] mb-1 transition-opacity duration-300">Study Consistency</h4>
                                <p id="targetDesc" class="text-xs text-[var(--text-muted)] leading-relaxed transition-opacity duration-300">You're on track to hit your goals. Keep reviewing materials daily to build long-term retention.</p>
                            </div>
                        </div>
                    </div>
                </main>
            `;
        },
        mount: () => {
            const carousel = document.getElementById('promoCarousel');
            const indicators = document.querySelectorAll('.promo-dot');
            if(carousel && indicators.length > 0) {
                carousel.addEventListener('scroll', () => {
                    const activeIndex = Math.round(carousel.scrollLeft / carousel.offsetWidth);
                    indicators.forEach((dot, idx) => dot.classList.toggle('active', idx === activeIndex));
                });
            }

            if (windowHomeRotator) clearInterval(windowHomeRotator);
            const targets = [
                { title: "Study Consistency", desc: "You're on track to hit your goals. Keep reviewing materials daily to build long-term retention." },
                { title: "Daily Streak", desc: "Consistency is key! Complete a quick review today to keep your streak alive." }
            ];
            let targetIdx = 0;
            windowHomeRotator = setInterval(() => {
                targetIdx = (targetIdx + 1) % targets.length;
                const tEl = document.getElementById('targetTitle');
                const dEl = document.getElementById('targetDesc');
                if(tEl && dEl) {
                    tEl.style.opacity = '0'; dEl.style.opacity = '0';
                    setTimeout(() => {
                        tEl.textContent = targets[targetIdx].title; dEl.textContent = targets[targetIdx].desc;
                        tEl.style.opacity = '1'; dEl.style.opacity = '1';
                    }, 300);
                }
            }, 6000);

            let activeUser = currentUser || JSON.parse(localStorage.getItem('nativeUser'));
            const titleEl = document.getElementById('greetingTitle');
            if (activeUser && titleEl) {
                const hour = new Date().getHours();
                const emoji = hour < 12 ? '⛅' : hour < 18 ? '☀️' : '🌙';
                const name = activeUser.displayName || activeUser.email?.split('@')[0] || 'User';
                titleEl.textContent = `Hi, ${name} ${emoji}`;
                titleEl.classList.remove('skeleton');

                document.getElementById('headerStreakDisplay').textContent = "1";
                document.getElementById('headerStreakDisplay').classList.remove('skeleton');
                
                document.getElementById('continueTitle').textContent = "Cardiology 101";
                document.getElementById('continueMeta').textContent = "45 ITEMS • ANATOMY";
                document.getElementById('continueProgressText').textContent = "+92%";
                ['continueTitle', 'continueMeta', 'continueProgressText', 'continueIconBox'].forEach(id => 
                    document.getElementById(id).classList.remove('skeleton')
                );
            }

            const modal = document.getElementById('streakModalBackdrop');
            const openBtn = document.getElementById('headerStreakBadge');
            const closeBtn = document.getElementById('closeStreakModal');

            if (openBtn) {
                openBtn.addEventListener('click', () => {
                    const days = ['M','T','W','T','F','S','S'];
                    let html = '';
                    days.forEach((d, i) => {
                        let cls = i < 3 ? 'done' : (i===3 ? 'active' : '');
                        let content = i < 4 ? '<i class="fas fa-check"></i>' : (20+i);
                        html += `<div class="flex flex-col items-center gap-1"><span class="text-xs text-zinc-500 font-bold">${d}</span><div class="day-circle ${cls}">${content}</div></div>`;
                    });
                    document.getElementById('calendarRow').innerHTML = html;
                    
                    if(window.lottie && !window.streakLottieAnim) {
                        window.streakLottieAnim = lottie.loadAnimation({ container: document.getElementById('modalStreakLottie'), renderer: 'svg', loop: true, autoplay: true, path: 'https://assets2.lottiefiles.com/packages/lf20_touohxv0.json' });
                    }
                    modal.classList.add('active');
                });
            }

            if (closeBtn) {
                closeBtn.addEventListener('click', () => {
                    modal.classList.remove('active');
                });
            }
        }
    };

    // 3. STUDY COMPONENT (NEW)
    const StudyView = {
        render: () => {
            return `
                <header class="pt-6 pb-2 px-5 sticky top-0 z-40 bg-[var(--bg-body)]">
                    <h1 class="text-2xl font-bold tracking-tight text-[var(--text-main)] mb-4">Library</h1>
                    
                    <div class="relative mb-4">
                        <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-[var(--text-muted)]"></i>
                        <input type="text" id="searchInput" placeholder="Search your decks..." class="w-full bg-[var(--bg-surface)] border border-[var(--border-color)] rounded-xl py-2.5 pl-11 pr-4 text-sm text-[var(--text-main)] focus:outline-none focus:border-[var(--accent-btn)]">
                    </div>
                    
                    <div class="flex overflow-x-auto hide-scroll gap-2 pb-2" id="libraryTabs">
                        <button class="tab-btn active px-4 py-1.5 rounded-full text-xs font-bold bg-[var(--text-main)] text-[var(--bg-body)] transition-colors" data-filter="all">All</button>
                        <button class="tab-btn px-4 py-1.5 rounded-full text-xs font-bold bg-[var(--bg-surface)] border border-[var(--border-color)] text-[var(--text-muted)] transition-colors" data-filter="anatomy">Anatomy</button>
                        <button class="tab-btn px-4 py-1.5 rounded-full text-xs font-bold bg-[var(--bg-surface)] border border-[var(--border-color)] text-[var(--text-muted)] transition-colors" data-filter="physiology">Physiology</button>
                        <button class="tab-btn px-4 py-1.5 rounded-full text-xs font-bold bg-[var(--bg-surface)] border border-[var(--border-color)] text-[var(--text-muted)] transition-colors" data-filter="pharmacology">Pharma</button>
                        <button class="tab-btn px-4 py-1.5 rounded-full text-xs font-bold bg-[var(--bg-surface)] border border-[var(--border-color)] text-[var(--text-muted)] transition-colors" data-filter="pathology">Pathology</button>
                    </div>
                </header>
                
                <main class="flex-1 overflow-y-auto px-4 pt-4 pb-32 hide-scroll" id="libraryGrid">
                    </main>
            `;
        },
        mount: () => {
            const libraryGrid = document.getElementById('libraryGrid');
            const searchInput = document.getElementById('searchInput');
            const tabs = document.querySelectorAll('.tab-btn');
            
            // 1. Fetch User's Decks from LocalStorage
            let uid = currentUser ? currentUser.uid : "guest";
            let quizzes = JSON.parse(localStorage.getItem('medexcel_quizzes_' + uid)) || [];
            
            // Temporary Dummy Data if library is empty (to test the UI)
            if (quizzes.length === 0) {
                quizzes = [
                    { id: 1, title: "Cardiovascular System", subject: "Anatomy", questions: new Array(45) },
                    { id: 2, title: "Autonomic Nervous System Drugs", subject: "Pharmacology", questions: new Array(120) },
                    { id: 3, title: "Cellular Injury & Adaptation", subject: "Pathology", questions: new Array(60) },
                    { id: 4, title: "Renal Function", subject: "Physiology", questions: new Array(85) }
                ];
            }

            // 2. Render Function
            const renderLibrary = (filter = 'all', searchQuery = '') => {
                libraryGrid.innerHTML = '';
                
                const filteredQuizzes = quizzes.filter(q => {
                    const matchesFilter = filter === 'all' || (q.subject && q.subject.toLowerCase().includes(filter));
                    const matchesSearch = q.title && q.title.toLowerCase().includes(searchQuery.toLowerCase());
                    return matchesFilter && matchesSearch;
                });

                if (filteredQuizzes.length === 0) {
                    libraryGrid.innerHTML = `
                        <div class="flex flex-col items-center justify-center text-center py-12 opacity-60">
                            <i class="fas fa-folder-open text-4xl mb-3 text-[var(--text-muted)]"></i>
                            <p class="text-[var(--text-muted)] text-sm">No decks found.</p>
                        </div>
                    `;
                    return;
                }

                filteredQuizzes.forEach(quiz => {
                    const itemCount = quiz.questions ? quiz.questions.length : 0;
                    const subject = quiz.subject || "General";
                    
                    libraryGrid.innerHTML += `
                        <div class="group-container p-4 mb-3 cursor-pointer active:scale-[0.98] transition-transform">
                            <div class="flex items-start justify-between mb-3">
                                <div>
                                    <h3 class="font-bold text-[var(--text-main)] mb-1">${quiz.title || "Untitled Deck"}</h3>
                                    <p class="text-xs text-[var(--text-muted)] font-medium uppercase tracking-wider">${itemCount} Cards • ${subject}</p>
                                </div>
                                <div class="w-8 h-8 rounded-full bg-[var(--bg-body)] flex items-center justify-center border border-[var(--border-color)] text-[var(--text-muted)]">
                                    <i class="fas fa-ellipsis-h text-xs"></i>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button class="flex-1 bg-[var(--accent-btn)]/10 text-[var(--accent-btn)] py-2 rounded-lg text-xs font-bold transition-colors hover:bg-[var(--accent-btn)] hover:text-white">Review</button>
                                <button class="flex-1 bg-[var(--bg-body)] border border-[var(--border-color)] py-2 rounded-lg text-xs font-bold text-[var(--text-main)] transition-colors hover:bg-[var(--bg-hover)]">Edit</button>
                            </div>
                        </div>
                    `;
                });
            };

            // 3. Tab Listeners
            tabs.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    // Reset styling for all tabs
                    tabs.forEach(b => {
                        b.classList.remove('active', 'bg-[var(--text-main)]', 'text-[var(--bg-body)]');
                        b.classList.add('bg-[var(--bg-surface)]', 'text-[var(--text-muted)]');
                    });
                    
                    // Apply styling to active tab
                    e.target.classList.add('active', 'bg-[var(--text-main)]', 'text-[var(--bg-body)]');
                    e.target.classList.remove('bg-[var(--bg-surface)]', 'text-[var(--text-muted)]');
                    
                    renderLibrary(e.target.dataset.filter, searchInput.value);
                });
            });

            // 4. Search Listener
            searchInput.addEventListener('input', (e) => {
                const activeTab = document.querySelector('.tab-btn.active').dataset.filter;
                renderLibrary(activeTab, e.target.value);
            });

            // Initial Render
            renderLibrary();
        }
    };

    // 4. LEADERBOARD COMPONENT
    const LeaderboardView = {
        render: () => {
            return `
                <header class="pt-6 pb-4 px-6 flex items-center justify-between shrink-0 sticky top-0 z-40 bg-[var(--bg-body)]">
                    <div>
                        <h1 class="text-2xl font-extrabold tracking-tight text-[var(--text-main)]">Leaderboard</h1>
                    </div>
                </header>
                <main class="flex-1 overflow-y-auto px-4 pt-4 hide-scroll">
                    <div id="leaderboardList" class="flex flex-col gap-2">
                        <div class="text-center text-[var(--text-muted)] py-6 text-sm">Loading ranks...</div>
                    </div>
                </main>
            `;
        },
        mount: async () => {
            const listContainer = document.getElementById('leaderboardList');
            if (!currentUser) {
                listContainer.innerHTML = '<div class="text-center text-[var(--text-muted)] py-6 text-sm">Please log in to view the leaderboard.</div>';
                return; 
            }
            try {
                const q = query(collection(db, "users"), orderBy("xp", "desc"), limit(50));
                const querySnapshot = await getDocs(q);
                listContainer.innerHTML = ''; 
                
                let rank = 1;
                querySnapshot.forEach((document) => {
                    const data = document.data();
                    if (data.xp > 0) {
                        const bgClass = document.id === currentUser.uid ? "bg-[var(--accent-btn)]/10 border-[var(--accent-btn)]" : "bg-[var(--bg-surface)] border-[var(--border-color)]";
                        const initial = (data.displayName || "U").charAt(0).toUpperCase();
                        listContainer.innerHTML += `
                            <div class="flex items-center justify-between p-3 rounded-xl border ${bgClass}">
                                <div class="flex items-center gap-4">
                                    <span class="text-sm font-bold text-[var(--text-muted)] w-4 text-center">${rank}</span>
                                    <div class="w-10 h-10 rounded-full bg-[var(--bg-body)] border border-[var(--border-color)] flex items-center justify-center font-bold">${initial}</div>
                                    <h4 class="text-sm font-bold text-[var(--text-main)]">${data.displayName || "Anonymous"}</h4>
                                </div>
                                <span class="text-xs font-bold text-[var(--text-muted)]">${data.xp.toLocaleString()} XP</span>
                            </div>`;
                        rank++;
                    }
                });
            } catch (e) { listContainer.innerHTML = '<div class="text-center text-red-500 py-6 text-sm">Failed to load leaderboard.</div>'; }
        }
    };

    // 5. PROFILE COMPONENT
    const ProfileView = {
        render: () => {
            return `
                <header class="pt-6 pb-2 px-5 flex items-center shrink-0 sticky top-0 z-40 bg-[var(--bg-body)]">
                    <h1 class="text-2xl font-bold tracking-tight text-[var(--text-main)]">Profile</h1>
                </header>
                <main class="flex-1 overflow-y-auto px-4 pt-4 hide-scroll">
                    <div class="group-container">
                        <div class="list-item">
                            <div class="flex flex-col">
                                <span id="userName" class="font-bold text-lg">Loading...</span>
                                <span id="userEmail" class="text-sm text-[var(--text-muted)]">...</span>
                            </div>
                        </div>
                    </div>
                    <div class="group-container">
                        <div class="list-item" id="btnLogout">
                            <div class="flex items-center gap-3">
                                <i class="fas fa-sign-out-alt text-red-400"></i>
                                <span class="text-[var(--text-main)] font-medium">Log Out</span>
                            </div>
                        </div>
                    </div>
                </main>
            `;
        },
        mount: async () => {
            let activeUser = currentUser || JSON.parse(localStorage.getItem('nativeUser'));
            if (activeUser) {
                document.getElementById("userName").textContent = activeUser.displayName || activeUser.email.split("@")[0];
                document.getElementById("userEmail").textContent = activeUser.email;
            }
            document.getElementById('btnLogout')?.addEventListener('click', async () => {
                if(confirm("Are you sure you want to log out?")) {
                    await signOut(auth);
                    localStorage.clear();
                    window.location.replace("index.html");
                }
            });
        }
    };

    // 6. ROUTER SETUP
    const appRoot = document.getElementById('app-root');
    const routes = {
        '/home': HomeView,
        '/study': StudyView,
        '/leaderboard': LeaderboardView,
        '/profile': ProfileView,
        '/create': { render: () => '<div class="p-6"><h1 class="text-2xl font-bold">Create</h1></div>', mount: () => {} }
    };
    
    async function handleRouting() {
        if (windowHomeRotator) clearInterval(windowHomeRotator); 
        
        let currentPath = window.location.hash.slice(1) || '/home';
        const view = routes[currentPath] || routes['/home'];
        
        appRoot.innerHTML = view.render();
        if (view.mount) await view.mount();
        
        document.querySelectorAll('.nav-item').forEach(nav => {
            nav.classList.toggle('active', nav.getAttribute('data-path') === currentPath);
        });
    }
    
    window.addEventListener('hashchange', handleRouting);
    window.addEventListener('DOMContentLoaded', handleRouting);

</script>
</body>
</html>
