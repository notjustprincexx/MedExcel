<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#09090b">
    <title>Aurora - Leaderboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        // Check for saved theme preference to prevent flickering
        (function() {
            const savedTheme = localStorage.getItem('medexcel_theme');
            if (savedTheme === 'light') {
                document.documentElement.classList.add('light-mode');
            }
        })();
    </script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        :root { 
            /* DARK MODE (Default) */
            --bg-body: #09090b;
            --bg-surface: #121216;
            --bg-hover: #1a1a20;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.05);
            
            --accent-btn: #a78bfa;
            --btn-text: #000000;
            
            --podium-bg: #1e293b;
            --nav-bg: #09090b;
            --nav-icon: #71717a;
            
            --ease-snap: cubic-bezier(0.19, 1, 0.22, 1); 
        }

        .light-mode {
            /* LIGHT MODE */
            --bg-body: #f1f5f9; 
            --bg-surface: #ffffff;
            --bg-hover: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: rgba(0, 0, 0, 0.06);
            
            --accent-btn: #8b5cf6;
            --btn-text: #ffffff;
            
            --podium-bg: #f1f5f9;
            --nav-bg: #ffffff;
            --nav-icon: #94a3b8;
        }

        body { 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; overflow-x: hidden; 
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        .glass-panel { background: var(--bg-surface); border: 1px solid var(--border-color); transition: background-color 0.3s ease, border-color 0.3s ease; }

        /* Skeleton Loading Animation */
        .skeleton {
            background: linear-gradient(90deg, rgba(128, 128, 128, 0.1) 25%, rgba(128, 128, 128, 0.2) 50%, rgba(128, 128, 128, 0.1) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
            color: transparent !important;
            border-color: transparent !important;
            pointer-events: none;
            overflow: hidden;
        }
        .skeleton * { visibility: hidden; }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Thick Outlined SVG Navigation matching Homepage */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: var(--nav-bg); 
            padding: 0.75rem 1.25rem calc(env(safe-area-inset-bottom, 0px) + 0.75rem); 
            display: flex; justify-content: space-between; align-items: center; z-index: 50; 
            transition: background-color 0.3s ease;
        }
        .nav-item { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.375rem;
            color: var(--nav-icon); transition: color 0.2s, transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1); cursor: pointer; flex: 1; text-decoration: none;
        }
        .nav-item.active { color: var(--accent-btn); }
        .nav-item:active { transform: scale(0.9); }
        .nav-item svg { 
            width: 24px; height: 24px; 
            display: block; 
            stroke: currentColor; 
            stroke-width: 2.25; 
            stroke-linecap: round; 
            stroke-linejoin: round;
        }
        .nav-label { font-size: 0.6875rem; font-weight: 500; letter-spacing: 0.02em; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden relative">

    <header class="pt-6 pb-4 px-6 flex items-center justify-between shrink-0 sticky top-0 z-40 bg-[var(--bg-body)] bg-opacity-95 backdrop-blur-md transition-colors duration-300">
        <div>
            <h1 class="text-2xl font-extrabold tracking-tight text-[var(--text-main)]">Leaderboard</h1>
            <p class="text-xs text-[var(--text-muted)] font-bold uppercase tracking-widest mt-1">Global Rankings</p>
        </div>
        <div class="border border-[var(--border-color)] bg-[var(--bg-surface)] px-3 py-1.5 rounded-full flex items-center gap-2 min-h-[32px] min-w-[70px] justify-center transition-colors duration-300">
            <i class="fas fa-fire text-orange-500"></i>
            <span class="text-xs font-bold text-[var(--text-main)] skeleton rounded" id="currentUserXp" style="width: 35px; height: 16px;"></span>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto pb-32 px-4 pt-4 hide-scroll" style="-webkit-overflow-scrolling: touch;">
        <div class="flex bg-[var(--bg-surface)] rounded-xl p-1 border border-[var(--border-color)] mb-8 mx-2 transition-colors duration-300">
            <button class="flex-1 py-2 text-sm font-bold rounded-lg bg-[var(--accent-btn)] text-[var(--btn-text)] shadow-md transition-all">All Time</button>
            <button class="flex-1 py-2 text-sm font-bold rounded-lg text-[var(--text-muted)] hover:text-[var(--text-main)] transition-all">This Week</button>
        </div>

        <section class="flex justify-center items-end h-64 mt-6 mb-10 gap-3 px-2" id="podiumContainer">
            <div class="flex flex-col items-center w-1/3 relative z-10">
                <div class="relative mb-2">
                    <div class="w-14 h-14 rounded-full border-4 border-slate-300 bg-[var(--podium-bg)] flex items-center justify-center overflow-hidden z-10 relative skeleton transition-colors duration-300" id="avatarBox2">
                        <span class="text-lg font-bold text-[var(--text-muted)]" id="avatar2">?</span>
                    </div>
                    <div class="absolute -bottom-2 left-1/2 transform -translate-x-1/2 w-6 h-6 bg-slate-300 rounded-full flex items-center justify-center text-[var(--bg-body)] font-black text-xs border-2 border-[var(--bg-body)] z-20 transition-colors duration-300">2</div>
                </div>
                <h3 class="text-xs font-bold text-[var(--text-main)] truncate text-center skeleton rounded mt-1" id="name2" style="width: 60px; height: 14px;"></h3>
                <p class="text-[10px] text-[var(--accent-btn)] font-bold mt-1 skeleton rounded" id="xp2" style="width: 35px; height: 12px;"></p>
                <div class="w-full h-20 bg-gradient-to-t from-slate-400/20 to-slate-400/5 mt-3 rounded-t-xl border-t border-slate-400/30"></div>
            </div>

            <div class="flex flex-col items-center w-1/3 relative z-20">
                <i class="fas fa-crown text-yellow-400 text-xl mb-1 filter drop-shadow-[0_0_8px_rgba(250,204,21,0.8)]"></i>
                <div class="relative mb-2">
                    <div class="w-20 h-20 rounded-full border-4 border-yellow-400 bg-[var(--podium-bg)] flex items-center justify-center overflow-hidden z-10 relative shadow-[0_0_20px_rgba(250,204,21,0.3)] skeleton transition-colors duration-300" id="avatarBox1">
                        <span class="text-2xl font-bold text-[var(--text-muted)]" id="avatar1">?</span>
                    </div>
                    <div class="absolute -bottom-2 left-1/2 transform -translate-x-1/2 w-7 h-7 bg-yellow-400 rounded-full flex items-center justify-center text-[var(--bg-body)] font-black text-sm border-2 border-[var(--bg-body)] z-20 transition-colors duration-300">1</div>
                </div>
                <h3 class="text-sm font-bold text-[var(--text-main)] truncate text-center skeleton rounded mt-1" id="name1" style="width: 80px; height: 18px;"></h3>
                <p class="text-[11px] text-yellow-500 font-bold mt-1 skeleton rounded" id="xp1" style="width: 45px; height: 14px;"></p>
                <div class="w-full h-28 bg-gradient-to-t from-yellow-500/20 to-yellow-500/5 mt-3 rounded-t-xl border-t border-yellow-500/40 relative overflow-hidden">
                    <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-30"></div>
                </div>
            </div>

            <div class="flex flex-col items-center w-1/3 relative z-10">
                <div class="relative mb-2">
                    <div class="w-14 h-14 rounded-full border-4 border-amber-500 bg-[var(--podium-bg)] flex items-center justify-center overflow-hidden z-10 relative skeleton transition-colors duration-300" id="avatarBox3">
                        <span class="text-lg font-bold text-[var(--text-muted)]" id="avatar3">?</span>
                    </div>
                    <div class="absolute -bottom-2 left-1/2 transform -translate-x-1/2 w-6 h-6 bg-amber-500 rounded-full flex items-center justify-center text-[var(--bg-body)] font-black text-xs border-2 border-[var(--bg-body)] z-20 transition-colors duration-300">3</div>
                </div>
                <h3 class="text-xs font-bold text-[var(--text-main)] truncate text-center skeleton rounded mt-1" id="name3" style="width: 60px; height: 14px;"></h3>
                <p class="text-[10px] text-[var(--accent-btn)] font-bold mt-1 skeleton rounded" id="xp3" style="width: 35px; height: 12px;"></p>
                <div class="w-full h-16 bg-gradient-to-t from-amber-500/20 to-amber-500/5 mt-3 rounded-t-xl border-t border-amber-500/30"></div>
            </div>
        </section>

        <section class="glass-panel rounded-3xl p-4">
            <div id="leaderboardList" class="flex flex-col gap-2">
                <div class="flex items-center justify-between p-3 rounded-xl border border-[var(--border-color)] bg-[var(--bg-surface)]">
                    <div class="flex items-center gap-4 w-full">
                        <div class="w-4 h-4 skeleton rounded shrink-0"></div>
                        <div class="w-10 h-10 rounded-full skeleton shrink-0"></div>
                        <div class="w-24 h-4 rounded skeleton"></div>
                    </div>
                    <div class="w-12 h-4 rounded skeleton shrink-0"></div>
                </div>
                <div class="flex items-center justify-between p-3 rounded-xl border border-[var(--border-color)] bg-[var(--bg-surface)]">
                    <div class="flex items-center gap-4 w-full">
                        <div class="w-4 h-4 skeleton rounded shrink-0"></div>
                        <div class="w-10 h-10 rounded-full skeleton shrink-0"></div>
                        <div class="w-20 h-4 rounded skeleton"></div>
                    </div>
                    <div class="w-10 h-4 rounded skeleton shrink-0"></div>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="homepage.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-4v-8h-2v8H5a2 2 0 0 1-2-2z"></path>
            </svg>
            <span class="nav-label">Home</span>
        </a>
        
        <a href="study.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </svg>
            <span class="nav-label">Library</span>
        </a>
        
        <a href="create.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            <span class="nav-label">Create</span>
        </a>
        
        <a href="leaderboard.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none">
                <line x1="18" y1="20" x2="18" y2="10"></line>
                <line x1="12" y1="20" x2="12" y2="4"></line>
                <line x1="6" y1="20" x2="6" y2="14"></line>
            </svg>
            <span class="nav-label">Leaders</span>
        </a>
        
        <a href="profile.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span class="nav-label">Profile</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADgcz_naQ_5tpXcpI8tSvm1b4RVLDrlaw",
            authDomain: "medxcel.firebaseapp.com",
            projectId: "medxcel",
            storageBucket: "medxcel.firebasestorage.app",
            messagingSenderId: "649180317389",
            appId: "1:649180317389:web:f6b9a7053a37853ea04b84"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function getInitial(name) { return name && name.length > 0 ? name.charAt(0).toUpperCase() : '?'; }
        function formatXP(xp) { return (xp || 0).toLocaleString() + " XP"; }

        function renderLeaderboard(users, currentUserId) {
            const listContainer = document.getElementById('leaderboardList');
            
            // Remove skeleton styles securely from podium items
            const skeletonElements = ['name1', 'xp1', 'avatarBox1', 'name2', 'xp2', 'avatarBox2', 'name3', 'xp3', 'avatarBox3'];
            skeletonElements.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.classList.remove('skeleton');
                    el.style.width = 'auto';
                    el.style.height = 'auto';
                }
            });

            if (users.length === 0) {
                listContainer.innerHTML = '<div class="text-center text-[var(--text-muted)] py-6 text-sm">No users have earned XP yet! Go study to be #1!</div>';
                return;
            }
            
            listContainer.innerHTML = ''; // Clear skeleton rows

            // 1st Place
            if(users[0]) {
                document.getElementById('name1').textContent = users[0].displayName || "Anonymous";
                document.getElementById('xp1').textContent = formatXP(users[0].xp);
                document.getElementById('avatar1').textContent = getInitial(users[0].displayName);
            }
            // 2nd Place
            if(users[1]) {
                document.getElementById('name2').textContent = users[1].displayName || "Anonymous";
                document.getElementById('xp2').textContent = formatXP(users[1].xp);
                document.getElementById('avatar2').textContent = getInitial(users[1].displayName);
            } else {
                document.getElementById('name2').textContent = "---";
            }
            // 3rd Place
            if(users[2]) {
                document.getElementById('name3').textContent = users[2].displayName || "Anonymous";
                document.getElementById('xp3').textContent = formatXP(users[2].xp);
                document.getElementById('avatar3').textContent = getInitial(users[2].displayName);
            } else {
                document.getElementById('name3').textContent = "---";
            }

            // Render List (4th onwards)
            users.slice(3).forEach((user, index) => {
                const rank = index + 4;
                const isCurrentUser = user.uid === currentUserId;
                const bgClass = isCurrentUser ? "bg-[var(--accent-btn)]/10 border-[var(--accent-btn)]" : "bg-[var(--bg-surface)] border-[var(--border-color)]";
                const textColor = isCurrentUser ? "text-[var(--accent-btn)]" : "text-[var(--text-main)]";
                
                listContainer.innerHTML += `
                    <div class="flex items-center justify-between p-3 rounded-xl border ${bgClass} transition-colors duration-300" style="animation: fadeIn 0.3s ease-out forwards; opacity: 0; animation-delay: ${index * 0.05}s;">
                        <div class="flex items-center gap-4">
                            <span class="text-sm font-bold text-[var(--text-muted)] w-4 text-center">${rank}</span>
                            <div class="w-10 h-10 rounded-full bg-[var(--podium-bg)] border border-[var(--border-color)] flex items-center justify-center text-[var(--text-muted)] font-bold shadow-inner transition-colors duration-300">
                                ${getInitial(user.displayName)}
                            </div>
                            <div>
                                <h4 class="text-sm font-bold ${textColor}">
                                    ${user.displayName || "Anonymous"} ${isCurrentUser ? '<span class="text-[10px] ml-2 px-2 py-0.5 bg-[var(--accent-btn)] text-white rounded-full">YOU</span>' : ''}
                                </h4>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="text-xs font-bold text-[var(--text-muted)]">${formatXP(user.xp)}</span>
                        </div>
                    </div>
                `;
            });
        }

        onAuthStateChanged(auth, async (user) => {
            let activeUid = user ? user.uid : null;

            // Load user's local XP to display top right and remove skeleton
            let localStats = JSON.parse(localStorage.getItem('medexcel_user_stats'));
            const xpHeaderEl = document.getElementById('currentUserXp');
            xpHeaderEl.classList.remove('skeleton');
            xpHeaderEl.style.width = 'auto';
            xpHeaderEl.style.height = 'auto';
            if (localStats && localStats.xp) {
                xpHeaderEl.textContent = formatXP(localStats.xp);
            } else {
                xpHeaderEl.textContent = "0 XP";
            }

            try {
                // REAL FIREBASE QUERY
                const usersRef = collection(db, "users");
                const q = query(usersRef, orderBy("xp", "desc"), limit(50));
                const querySnapshot = await getDocs(q);
                
                let fetchedUsers = [];
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    if(data.xp && data.xp > 0) {
                        fetchedUsers.push({
                            uid: doc.id,
                            displayName: data.displayName || data.email?.split('@')[0] || "User",
                            xp: data.xp
                        });
                    }
                });

                renderLeaderboard(fetchedUsers, activeUid);

            } catch (error) {
                console.error("Firebase fetch error:", error);
                const listContainer = document.getElementById('leaderboardList');
                if(error.message.includes("index")) {
                    listContainer.innerHTML = `<div class="text-center text-yellow-500 py-6 text-sm"><i class="fas fa-exclamation-triangle mr-2"></i> Firebase requires an Index.</div>`;
                } else {
                    listContainer.innerHTML = `<div class="text-center text-red-500 py-6 text-sm"><i class="fas fa-times-circle mr-2"></i> Failed to load leaderboard.</div>`;
                }
            }
        });
    </script>
</body>
</html>
