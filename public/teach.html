<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>MedExcel Tutor — Live Mode</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* THEME: "Deep Void" - Matched to Screenshot */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #121214;
    }

    body {
      height: 100dvh; 
      width: 100vw;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #ffffff;
      position: relative;
    }

    /* BACKGROUND: Subtle top gradient matching the screenshot's dark canvas */
    .aurora-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to bottom, #09090b 0%, #121214 70%);
      z-index: 0;
      pointer-events: none;
    }

    /* THE PRESENCE (Seamless Glowing Wave at the bottom) */
    .presence-container {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50vh; 
      z-index: 0;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      bottom: -30vh;
      left: -50vw;
      width: 200vw;
      height: 80vh;
      border-radius: 50%;
      background: radial-gradient(ellipse at center bottom, rgba(255,255,255,0.85) 0%, rgba(138, 180, 248, 0.35) 40%, transparent 70%);
      filter: blur(55px);
      transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
      transform-origin: center bottom;
    }

    /* Wave States */
    .orb.listening {
      background: radial-gradient(ellipse at center bottom, rgba(52, 211, 153, 0.7) 0%, rgba(52, 211, 153, 0.25) 40%, transparent 70%);
      animation: waveBreathe 3s infinite ease-in-out;
    }

    .orb.thinking {
      background: radial-gradient(ellipse at center bottom, rgba(96, 165, 250, 0.7) 0%, rgba(96, 165, 250, 0.25) 40%, transparent 70%);
      animation: wavePulse 1.5s infinite ease-in-out;
    }

    .orb.speaking {
      background: radial-gradient(ellipse at center bottom, rgba(167, 139, 250, 0.7) 0%, rgba(167, 139, 250, 0.25) 40%, transparent 70%);
      animation: waveSpeak 1.5s infinite ease-in-out alternate;
    }

    @keyframes waveBreathe {
      0%, 100% { transform: scaleY(1.1); opacity: 0.8; }
      50% { transform: scaleY(1.35); opacity: 1; }
    }
    @keyframes wavePulse {
      0%, 100% { transform: scaleY(1); opacity: 0.6; }
      50% { transform: scaleY(1.05); opacity: 0.9; }
    }
    @keyframes waveSpeak {
      0% { transform: scaleY(1.1); opacity: 0.7; filter: blur(65px); }
      100% { transform: scaleY(1.45); opacity: 1; filter: blur(45px); }
    }

    /* CONTROLS */
    .control-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 0 24px calc(40px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 20;
    }

    .subtitle-area {
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      margin-bottom: 24px;
      padding: 0 20px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    }

    .btn-mic {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 24px;
      transition: all 0.2s cubic-bezier(0.19, 1, 0.22, 1);
      background: #27272a; 
      color: #ffffff;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
    
    .btn-mic:active { transform: scale(0.9); }

    .btn-mic.active {
      background: #ffffff;
      color: #000000;
      box-shadow: 0 0 40px rgba(255,255,255,0.4);
    }

    /* Top Header */
    .top-header {
      position: absolute;
      top: max(24px, env(safe-area-inset-top));
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 0 24px;
      z-index: 20;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: #94a3b8;
      transition: all 0.3s;
    }
    .status-dot.active { 
      background-color: #34d399; 
      box-shadow: 0 0 8px #34d399; 
    }
  </style>
</head>
<body>

  <div id="auroraBg" class="aurora-bg"></div>

  <header class="top-header mt-2">
    <a href="homepage1.html" class="w-10 h-10 flex items-center justify-start text-white/80 hover:text-white transition-colors text-xl">
      <i class="fas fa-arrow-left"></i>
    </a>
    
    <div class="flex flex-col items-center">
      <span class="font-extrabold text-lg tracking-wide text-white drop-shadow-md">MedExcel Tutor</span>
      <div class="flex items-center gap-2 mt-1 opacity-80">
        <div id="statusDot" class="status-dot"></div>
        <span id="statusText" class="text-[11px] font-bold uppercase tracking-widest text-slate-300">Live</span>
      </div>
    </div>
    
    <div class="w-10"></div> 
  </header>

  <main class="presence-container">
    <div id="orb" class="orb"></div>
  </main>

  <footer class="control-bar">
    <div class="subtitle-area">
      <p id="subtitleText" class="text-white text-xl font-medium leading-relaxed tracking-wide transition-all duration-300">
        Tap the mic to start speaking immediately
      </p>
    </div>

    <button id="micBtn" class="btn-mic" aria-label="Toggle Microphone">
      <i class="fas fa-microphone"></i>
    </button>
  </footer>

  <script>
    const AUDIO_ANALYSIS_URL = "https://us-central1-medxcel.cloudfunctions.net/analyzeTeachingAudio";
    const GEMINI_TTS_PROXY_URL = "https://us-central1-medxcel.cloudfunctions.net/speakGemini";

    const micBtn = document.getElementById('micBtn');
    const orb = document.getElementById('orb');
    const auroraBg = document.getElementById('auroraBg');
    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');
    const subtitleText = document.getElementById('subtitleText');

    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;
    let isSpeaking = false;

    function setVisualState(state) {
      orb.classList.remove('listening', 'thinking', 'speaking');
      micBtn.classList.remove('active');
      statusDot.classList.remove('active');
      auroraBg.classList.remove('active');

      switch(state) {
        case 'IDLE':
          statusText.textContent = "Live";
          if(!isSpeaking && !isRecording) {
             subtitleText.textContent = "Tap the mic to start speaking immediately";
          }
          break;
        case 'LISTENING':
          orb.classList.add('listening');
          micBtn.classList.add('active');
          statusDot.classList.add('active');
          auroraBg.classList.add('active');
          statusText.textContent = "Listening";
          subtitleText.textContent = "Tap the mic again when you are done speaking";
          break;
        case 'THINKING':
          orb.classList.add('thinking');
          statusText.textContent = "Processing";
          subtitleText.textContent = "Analyzing your explanation...";
          break;
        case 'SPEAKING':
          orb.classList.add('speaking');
          auroraBg.classList.add('active');
          statusText.textContent = "Aurora";
          break;
      }
    }

    micBtn.addEventListener('click', async () => {
      if (isSpeaking) {
        window.speechSynthesis.cancel();
        isSpeaking = false;
        setVisualState('IDLE');
        return;
      }
      
      if (isRecording) {
        isRecording = false;
        if (mediaRecorder && mediaRecorder.state !== "inactive") {
          mediaRecorder.stop();
        }
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        const options = { mimeType: 'audio/webm' };
        if (!MediaRecorder.isTypeSupported('audio/webm')) {
            options.mimeType = 'audio/mp4'; 
        }

        mediaRecorder = new MediaRecorder(stream, options);
        audioChunks = [];

        mediaRecorder.ondataavailable = event => {
          if (event.data.size > 0) audioChunks.push(event.data);
        };

        mediaRecorder.onstop = async () => {
          stream.getTracks().forEach(track => track.stop());
          
          if (audioChunks.length === 0) {
            setVisualState('IDLE');
            return;
          }

          setVisualState('THINKING');
          const audioBlob = new Blob(audioChunks, { type: options.mimeType });
          
          const reader = new FileReader();
          reader.readAsDataURL(audioBlob);
          reader.onloadend = async () => {
            const base64String = reader.result.split(',')[1];
            await sendAudioToBackend(base64String, options.mimeType);
          };
        };

        mediaRecorder.start();
        isRecording = true;
        setVisualState('LISTENING');

      } catch (err) {
        console.error("Mic access denied or failed", err);
        alert("Microphone access is required to use this feature.");
      }
    });

    async function sendAudioToBackend(base64Audio, mimeType) {
      try {
        const res = await fetch(AUDIO_ANALYSIS_URL, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ audioBase64: base64Audio, mimeType: mimeType })
        });
        
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        
        const cleanText = data.text.replace(/```json/gi, '').replace(/```/g, '').trim();
        const json = JSON.parse(cleanText);
        
        subtitleText.textContent = json.feedback;
        await speakNaturally(json.feedback + " " + json.question);

      } catch (err) {
        console.error("AI Error", err);
        setVisualState('IDLE');
      }
    }

    async function speakNaturally(text) {
      setVisualState('SPEAKING');
      isSpeaking = true;
      
      const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
      
      for (const sentence of sentences) {
        if (!isSpeaking) break;
        await playAudioChunk(sentence.trim());
      }
      
      isSpeaking = false;
      setVisualState('IDLE');
    }

    async function playAudioChunk(text) {
      return new Promise(async (resolve) => {
        if (!text) { resolve(); return; }

        try {
          const res = await fetch(GEMINI_TTS_PROXY_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ text })
          });

          if (!res.ok) throw new Error('TTS proxy failed');

          const data = await res.json();
          if (!data.audio) throw new Error('No audio in response');

          const binary = atob(data.audio);
          const len = binary.length;
          const bytes = new Uint8Array(len);
          for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);

          const blob = new Blob([bytes.buffer], { type: data.contentType || 'audio/mpeg' });
          const url = URL.createObjectURL(blob);
          const audio = new Audio(url);

          audio.onended = () => { URL.revokeObjectURL(url); resolve(); };
          audio.onerror = () => { URL.revokeObjectURL(url); fallbackTTS(text, resolve); };

          audio.play().catch(() => fallbackTTS(text, resolve));

        } catch (err) {
          console.error('TTS error', err);
          fallbackTTS(text, resolve);
        }
      });
    }

    function fallbackTTS(text, resolveCallback) {
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 1.0;
      utter.pitch = 1.0;
      utter.onend = resolveCallback;
      window.speechSynthesis.speak(utter);
    }
  </script>
</body>
</html>
