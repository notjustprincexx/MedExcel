<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Reset Password — MedExcel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="css/index.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<div id="loginModal" class="login-modal" style="display:flex;">
  <div class="lm-header">
    <div></div>
    <h2 id="lmTitle" class="lm-title">Reset Password</h2>
  </div>

  <!-- Loading -->
  <div id="loadingState" class="lm-form" style="align-items:center;padding:2rem 0;">
    <div style="width:28px;height:28px;border-radius:50%;border:3px solid rgba(139,92,246,0.2);border-top-color:#8b5cf6;animation:spin 0.75s linear infinite;"></div>
  </div>

  <!-- Form -->
  <div id="formState" class="lm-form" style="display:none;">
    <p style="font-size:0.8rem;color:var(--text-muted,#94a3b8);text-align:center;margin-bottom:1rem;line-height:1.55;">
      Choose a new password for your account.
    </p>
    <div class="lm-input-group">
      <div class="lm-input-row">
        <input id="newPass" type="password" placeholder="New password" class="lm-input" autocomplete="new-password">
        <button class="lm-toggle-pw" type="button" onclick="toggleVis('newPass',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="lm-input-row">
        <input id="confirmPass" type="password" placeholder="Confirm password" class="lm-input" autocomplete="new-password">
        <button class="lm-toggle-pw" type="button" onclick="toggleVis('confirmPass',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <button id="resetBtn" class="lm-submit" onclick="doReset()">Set New Password</button>
    <div id="formMsg" style="font-size:0.8rem;text-align:center;margin-top:0.75rem;min-height:1.25rem;font-weight:500;color:#f87171;"></div>
  </div>

  <!-- Success -->
  <div id="successState" class="lm-form" style="display:none;align-items:center;text-align:center;">
    <div style="width:52px;height:52px;border-radius:50%;background:rgba(74,222,128,0.12);border:1.5px solid rgba(74,222,128,0.3);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <p style="font-size:0.9rem;font-weight:700;margin-bottom:0.375rem;">Password updated!</p>
    <p style="font-size:0.8rem;color:var(--text-muted,#94a3b8);line-height:1.55;margin-bottom:1.5rem;">You can now sign in with your new password.</p>
    <a href="index.html" class="lm-submit" style="text-decoration:none;text-align:center;display:block;">Back to Sign In</a>
  </div>

  <!-- Invalid -->
  <div id="invalidState" class="lm-form" style="display:none;align-items:center;text-align:center;">
    <div style="width:52px;height:52px;border-radius:50%;background:rgba(248,113,113,0.1);border:1.5px solid rgba(248,113,113,0.25);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    </div>
    <p style="font-size:0.9rem;font-weight:700;margin-bottom:0.375rem;">Link expired</p>
    <p id="invalidMsg" style="font-size:0.8rem;color:var(--text-muted,#94a3b8);line-height:1.55;margin-bottom:1.5rem;">This reset link is invalid or has already been used. Please request a new one.</p>
    <a href="index.html" class="lm-submit" style="text-decoration:none;text-align:center;display:block;">Back to Sign In</a>
  </div>
</div>

<script type="module">
  import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getAuth, verifyPasswordResetCode, confirmPasswordReset }
    from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey:            "AIzaSyADgcz_naQ_5tpXcpI8tSvm1b4RVLDrlaw",
    authDomain:        "medxcel.firebaseapp.com",
    projectId:         "medxcel",
    storageBucket:     "medxcel.firebasestorage.app",
    messagingSenderId: "649180317389",
    appId:             "1:649180317389:web:f6b9a7053a37853ea04b84"
  };

  const app  = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const oobCode = new URLSearchParams(location.search).get('oobCode');

  function show(id) {
    ['loadingState','formState','successState','invalidState']
      .forEach(s => {
        const el = document.getElementById(s);
        el.style.display = s === id ? 'flex' : 'none';
      });
  }

  if (!oobCode) {
    show('invalidState');
    document.getElementById('invalidMsg').textContent =
      'No reset code found. Please request a new password reset from the app.';
  } else {
    verifyPasswordResetCode(auth, oobCode)
      .then(() => show('formState'))
      .catch(() => show('invalidState'));
  }

  window._auth    = auth;
  window._oobCode = oobCode;
  window._confirmPasswordReset = confirmPasswordReset;
</script>

<script>
  function toggleVis(id, btn) {
    var input = document.getElementById(id);
    var hide  = input.type === 'password';
    input.type = hide ? 'text' : 'password';
    btn.querySelector('svg').innerHTML = hide
      ? '<line x1="1" y1="1" x2="23" y2="23"/><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }

  async function doReset() {
    var newPass     = document.getElementById('newPass').value;
    var confirmPass = document.getElementById('confirmPass').value;
    var msg = document.getElementById('formMsg');
    var btn = document.getElementById('resetBtn');
    msg.textContent = '';

    if (!newPass || newPass.length < 6) {
      msg.textContent = 'Password must be at least 6 characters.'; return;
    }
    if (newPass !== confirmPass) {
      msg.textContent = 'Passwords do not match.'; return;
    }

    btn.disabled = true;
    btn.textContent = 'Updating…';

    try {
      await window._confirmPasswordReset(window._auth, window._oobCode, newPass);
      document.getElementById('formState').style.display    = 'none';
      document.getElementById('successState').style.display = 'flex';
    } catch(e) {
      msg.textContent =
        (e.code === 'auth/expired-action-code' || e.code === 'auth/invalid-action-code')
          ? 'This link has expired. Please request a new reset link.'
          : e.code === 'auth/weak-password'
          ? 'Choose a stronger password (min. 6 characters).'
          : 'Something went wrong. Please try again.';
      btn.disabled = false;
      btn.textContent = 'Set New Password';
    }
  }
</script>
</body>
</html>
