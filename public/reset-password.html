<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Reset Password — MedExcel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0f0f13;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
    }
    .modal {
      width: 100%; max-width: 380px;
      background: #18181b;
      border: 1px solid rgba(139,92,246,0.2);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal-header { padding: 1.25rem 1.25rem 0; text-align: center; margin-bottom: 1.25rem; }
    .modal-title  { font-size: 1.125rem; font-weight: 800; letter-spacing: -0.02em; }
    .modal-body   { padding: 0 1.25rem 1.75rem; }
    .subtitle     { font-size: 0.8rem; color: #94a3b8; text-align: center; line-height: 1.55; margin-bottom: 1.25rem; }
    .input-row    { position: relative; margin-bottom: 0.75rem; }
    .input-row input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 0.875rem 2.75rem 0.875rem 1rem;
      font-size: 0.9375rem;
      font-family: inherit;
      color: #f8fafc;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .input-row input::placeholder { color: #64748b; }
    .input-row input:focus { border-color: #8b5cf6; background: rgba(139,92,246,0.06); }
    .toggle-pw {
      position: absolute; right: 0.875rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: #64748b;
      padding: 0; display: flex; transition: color 0.2s;
    }
    .toggle-pw:hover { color: #f8fafc; }
    .toggle-pw svg  { width: 18px; height: 18px; }
    .btn {
      width: 100%; padding: 0.9375rem; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #7c3aed 0%, #8b5cf6 100%);
      color: #fff; font-size: 0.9375rem; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 4px 18px rgba(124,58,237,0.35);
      display: block; text-align: center; text-decoration: none;
      margin-bottom: 0.5rem;
    }
    .btn:hover:not(:disabled)  { opacity: 0.9; }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { font-size: 0.8rem; text-align: center; min-height: 1.25rem; margin: 0.5rem 0; font-weight: 500; line-height: 1.5; }
    .state { display: none; }
    .state.active { display: block; }
    .center-icon {
      width: 52px; height: 52px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;
    }
    .center-icon.green { background: rgba(74,222,128,0.12); border: 1.5px solid rgba(74,222,128,0.3); }
    .center-icon.red   { background: rgba(248,113,113,0.1); border: 1.5px solid rgba(248,113,113,0.25); }
    .state-title { font-size: 1rem; font-weight: 800; text-align: center; margin-bottom: 0.375rem; }
    .state-sub   { font-size: 0.8rem; color: #94a3b8; text-align: center; line-height: 1.55; margin-bottom: 1.25rem; }
    .spinner { display: flex; align-items: center; justify-content: center; padding: 2rem 0; }
    .spin {
      width: 28px; height: 28px; border-radius: 50%;
      border: 3px solid rgba(139,92,246,0.2); border-top-color: #8b5cf6;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="modal">
  <div class="modal-header">
    <div class="modal-title">Reset Password</div>
  </div>
  <div class="modal-body">

    <!-- Loading -->
    <div id="loadingState" class="state active">
      <div class="spinner"><div class="spin"></div></div>
    </div>

    <!-- Form -->
    <div id="formState" class="state">
      <p class="subtitle">Choose a new password for your MedExcel account.</p>
      <div class="input-row">
        <input id="newPass" type="password" placeholder="New password" autocomplete="new-password">
        <button class="toggle-pw" type="button" onclick="toggleVis('newPass',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="input-row">
        <input id="confirmPass" type="password" placeholder="Confirm password" autocomplete="new-password">
        <button class="toggle-pw" type="button" onclick="toggleVis('confirmPass',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <button class="btn" id="resetBtn" onclick="doReset()">Set New Password</button>
      <div class="msg" id="formMsg"></div>
    </div>

    <!-- Success -->
    <div id="successState" class="state">
      <div class="center-icon green">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <p class="state-title">Password updated!</p>
      <p class="state-sub">You can now sign in to MedExcel with your new password.</p>
      <a href="index.html" class="btn">Back to Sign In</a>
    </div>

    <!-- Invalid / expired -->
    <div id="invalidState" class="state">
      <div class="center-icon red">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      </div>
      <p class="state-title">Link expired</p>
      <p class="state-sub" id="invalidMsg">This reset link is invalid or has already been used.</p>
      <div class="input-row">
        <input id="resendEmail" type="email" placeholder="Enter your email" autocomplete="email">
      </div>
      <button class="btn" id="resendBtn" onclick="doResend()">Send New Reset Link</button>
      <div class="msg" id="resendMsg"></div>
    </div>

  </div>
</div>

<script type="module">
  import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getAuth, verifyPasswordResetCode, confirmPasswordReset }
    from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey:            "AIzaSyADgcz_naQ_5tpXcpI8tSvm1b4RVLDrlaw",
    authDomain:        "medxcel.firebaseapp.com",
    projectId:         "medxcel",
    storageBucket:     "medxcel.firebasestorage.app",
    messagingSenderId: "649180317389",
    appId:             "1:649180317389:web:f6b9a7053a37853ea04b84"
  };

  const app     = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
  const auth    = getAuth(app);
  const oobCode = new URLSearchParams(location.search).get('oobCode');

  function show(id) {
    document.querySelectorAll('.state').forEach(el => el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  if (!oobCode) {
    show('invalidState');
    document.getElementById('invalidMsg').textContent =
      'No reset code found. Enter your email below to get a new link.';
  } else {
    verifyPasswordResetCode(auth, oobCode)
      .then(() => show('formState'))
      .catch(() => show('invalidState'));
  }

  window._auth                 = auth;
  window._oobCode              = oobCode;
  window._confirmPasswordReset = confirmPasswordReset;
</script>

<script>
  function toggleVis(id, btn) {
    var input = document.getElementById(id);
    var hide  = input.type === 'password';
    input.type = hide ? 'text' : 'password';
    btn.querySelector('svg').innerHTML = hide
      ? '<line x1="1" y1="1" x2="23" y2="23"/><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }

  async function doReset() {
    var newPass     = document.getElementById('newPass').value;
    var confirmPass = document.getElementById('confirmPass').value;
    var msg = document.getElementById('formMsg');
    var btn = document.getElementById('resetBtn');
    msg.style.color = '#f87171';
    msg.textContent = '';

    if (!newPass || newPass.length < 6) { msg.textContent = 'Password must be at least 6 characters.'; return; }
    if (newPass !== confirmPass)        { msg.textContent = 'Passwords do not match.'; return; }

    btn.disabled = true;
    btn.textContent = 'Updating…';

    try {
      await window._confirmPasswordReset(window._auth, window._oobCode, newPass);
      document.querySelectorAll('.state').forEach(el => el.classList.remove('active'));
      document.getElementById('successState').classList.add('active');
    } catch(e) {
      msg.textContent =
        (e.code === 'auth/expired-action-code' || e.code === 'auth/invalid-action-code')
          ? 'This link has expired. Please request a new reset link.'
          : e.code === 'auth/weak-password'
          ? 'Choose a stronger password (min. 6 characters).'
          : 'Something went wrong. Please try again.';
      btn.disabled = false;
      btn.textContent = 'Set New Password';
    }
  }

  async function doResend() {
    var email = document.getElementById('resendEmail').value.trim();
    var msg   = document.getElementById('resendMsg');
    var btn   = document.getElementById('resendBtn');
    msg.style.color = '#f87171';
    msg.textContent = '';

    if (!email) { msg.textContent = 'Please enter your email address.'; return; }

    btn.disabled = true;
    btn.textContent = 'Sending…';

    try {
      var res = await fetch('https://us-central1-medxcel.cloudfunctions.net/sendResetEmail', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email: email })
      });
      if (!res.ok) {
        var body = await res.json().catch(function() { return {}; });
        throw new Error(body.error || 'Server error (' + res.status + ')');
      }
      msg.style.color = '#4ade80';
      msg.textContent = 'Reset link sent! Check your inbox.';
      btn.textContent = 'Sent ✓';
    } catch(e) {
      msg.textContent = e.message || 'Something went wrong. Please try again.';
      btn.disabled = false;
      btn.textContent = 'Send New Reset Link';
    }
  }
</script>
</body>
</html>
