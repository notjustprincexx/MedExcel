<!-- ────────────────────────────────────────────────────────────
     PASTE THIS BLOCK right after your <button id="payCTABtn">
     in the view-payment section of hometest.html
──────────────────────────────────────────────────────────── -->

<!-- Already paid? Recovery link -->
<div style="text-align:center;margin-top:.75rem;">
    <button
        id="alreadyPaidBtn"
        onclick="window.showRecoveryPanel()"
        style="background:none;border:none;font-size:.75rem;color:var(--text-muted);cursor:pointer;text-decoration:underline;text-underline-offset:3px;padding:.25rem .5rem;"
    >
        Already paid but not upgraded? Recover access →
    </button>
</div>

<!-- Recovery panel (hidden by default) -->
<div id="recoveryPanel" style="display:none;margin-top:.75rem;background:var(--bg-surface);border:1px solid var(--border-color);border-radius:1.25rem;padding:1rem 1.125rem;">
    <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.625rem;">
        <i class="fas fa-rotate-right" style="color:#3b82f6;font-size:.875rem;"></i>
        <span style="font-size:.875rem;font-weight:700;color:var(--text-main);">Recover Premium Access</span>
    </div>
    <p style="font-size:.75rem;color:var(--text-muted);line-height:1.5;margin:0 0 .75rem;">
        If you were charged but your plan wasn't activated, enter your Paystack payment reference below.
        You can find it in your bank SMS or email receipt.
    </p>
    <input
        id="recoveryRefInput"
        type="text"
        placeholder="e.g. medx_1776688607371_0u2ai3"
        style="width:100%;box-sizing:border-box;padding:.625rem .875rem;font-size:.8125rem;background:var(--bg-body);border:1px solid var(--border-color);border-radius:.75rem;color:var(--text-main);outline:none;margin-bottom:.625rem;font-family:monospace;"
    />
    <div id="recoveryStatus" style="display:none;font-size:.75rem;padding:.5rem .75rem;border-radius:.625rem;margin-bottom:.625rem;"></div>
    <button
        id="recoverySubmitBtn"
        onclick="window.submitRecovery()"
        style="width:100%;padding:.75rem;background:#3b82f6;color:white;border:none;border-radius:.875rem;font-size:.875rem;font-weight:700;cursor:pointer;"
    >
        Verify &amp; Activate Premium
    </button>
</div>


<!-- ────────────────────────────────────────────────────────────
     PASTE THIS SCRIPT anywhere in your <script> section
     (e.g. at the bottom of app_bundle.js or in a <script> tag)
──────────────────────────────────────────────────────────── -->
<script>
window.showRecoveryPanel = function() {
    const panel = document.getElementById('recoveryPanel');
    const btn   = document.getElementById('alreadyPaidBtn');
    if (!panel) return;
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    if (panel.style.display === 'block') {
        btn.textContent = 'Hide recovery panel';
        document.getElementById('recoveryRefInput').focus();
    } else {
        btn.textContent = 'Already paid but not upgraded? Recover access →';
    }
};

window.submitRecovery = async function() {
    const input  = document.getElementById('recoveryRefInput');
    const status = document.getElementById('recoveryStatus');
    const btn    = document.getElementById('recoverySubmitBtn');
    const ref    = (input?.value || '').trim();

    if (!ref) {
        status.style.display = 'block';
        status.style.background = 'rgba(239,68,68,.1)';
        status.style.color = '#ef4444';
        status.textContent = 'Please enter your payment reference.';
        return;
    }

    btn.textContent = 'Verifying…';
    btn.disabled = true;
    status.style.display = 'none';

    try {
        const { getFunctions, httpsCallable } = await import(
            "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js"
        );
        const fns    = getFunctions(window.auth?.app, "us-central1");
        const verify = httpsCallable(fns, "verifySubscriptionPayment");
        const result = await verify({ reference: ref });

        if (result.data?.success) {
            const newPlan = result.data.plan;
            window.userPlan = newPlan;
            if (typeof window.updatePlanIcon === 'function') window.updatePlanIcon(newPlan);
            if (typeof window.applyAvatar    === 'function') window.applyAvatar();
            window.allowedMaxItems = newPlan === 'premium' ? 50 : 20;

            status.style.display = 'block';
            status.style.background = 'rgba(16,185,129,.1)';
            status.style.color = '#10b981';
            status.textContent = '✓ Premium activated! Redirecting…';

            btn.textContent = '✓ You\'re Premium!';
            btn.style.background = '#10b981';

            setTimeout(() => {
                if (typeof navigateTo === 'function') navigateTo('view-home');
            }, 2000);
        } else {
            throw new Error(result.data?.message || 'Reference not found or already used.');
        }
    } catch(e) {
        console.error('Recovery error:', e);
        status.style.display = 'block';
        status.style.background = 'rgba(239,68,68,.1)';
        status.style.color = '#ef4444';
        status.textContent = '✗ ' + (e.message || 'Verification failed. Contact support with your reference.');
        btn.textContent = 'Try Again';
        btn.disabled = false;
    }
};
</script>
