<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Teach Aurora — Live Mode</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* THEME: "Deep Void" - Pure Immersion */
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000000; }
    body { height: 100dvh; width: 100vw; display: flex; flex-direction: column; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #ffffff; }

    /* BACKGROUND */
    .aurora-bg {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at 50% 120%, rgba(37, 99, 235, 0.2), transparent 60%),
                  radial-gradient(circle at 0% 100%, rgba(99, 102, 241, 0.15), transparent 45%),
                  radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.15), transparent 45%);
      z-index: 0; transition: opacity 1s ease; opacity: 0.6; pointer-events: none;
    }
    .aurora-bg.active { opacity: 1; filter: brightness(1.3); }

    /* THE ORB */
    .presence-container { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; z-index: 10; width: 100%; }
    .orb { width: 160px; height: 160px; border-radius: 50%; background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01)); backdrop-filter: blur(10px); box-shadow: inset 0 0 20px rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); display: grid; place-items: center; transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); position: relative; }
    .orb::after { content: ''; position: absolute; width: 40%; height: 40%; background: rgba(255,255,255,0.8); border-radius: 50%; filter: blur(20px); opacity: 0.3; transition: all 0.4s ease; }

    /* STATES */
    .orb.listening { transform: scale(1.1); border-color: rgba(52, 211, 153, 0.3); box-shadow: 0 0 60px rgba(52, 211, 153, 0.1); }
    .orb.listening::after { background: #34d399; opacity: 0.6; animation: breathe 3s infinite ease-in-out; }
    .orb.thinking { transform: scale(0.95); border-color: rgba(96, 165, 250, 0.5); }
    .orb.thinking::after { background: #60a5fa; opacity: 0.8; animation: ping 1s infinite cubic-bezier(0, 0, 0.2, 1); }
    .orb.speaking { transform: scale(1.05); border-color: rgba(167, 139, 250, 0.4); box-shadow: 0 0 50px rgba(139, 92, 246, 0.2); }
    .orb.speaking::after { background: #a78bfa; opacity: 0.7; animation: voiceWave 1.5s infinite ease-in-out alternate; }

    @keyframes breathe { 0%, 100% { transform: scale(0.95); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 0.8; } }
    @keyframes voiceWave { 0% { transform: scale(0.8); opacity: 0.6; filter: blur(25px); } 100% { transform: scale(1.5); opacity: 0.9; filter: blur(15px); } }

    /* CONTROLS */
    .control-bar { padding: 0 20px calc(40px + env(safe-area-inset-bottom)); width: 100%; display: flex; justify-content: center; align-items: flex-end; z-index: 20; flex-shrink: 0; min-height: 120px; position: relative; }
    .btn { width: 72px; height: 72px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.1s ease, background 0.2s, box-shadow 0.2s; }
    .btn:active { transform: scale(0.9); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-mic { background: #e2e8f0; color: #0f172a; box-shadow: 0 0 30px rgba(255,255,255,0.1); z-index: 2;}
    .btn-mic.active { background: #ffffff; box-shadow: 0 0 50px rgba(255,255,255,0.5); }
    .btn-exit { width: 48px; height: 48px; background: rgba(255,255,255,0.1); color: white; position: absolute; left: 24px; bottom: calc(40px + env(safe-area-inset-bottom) + 12px); z-index: 1;}

    /* Top Status */
    .status-pill { position: absolute; top: max(24px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 8px 16px; border-radius: 99px; font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.7); letter-spacing: 1px; text-transform: uppercase; z-index: 20; display: flex; align-items: center; gap: 8px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background-color: #94a3b8; }
    .status-dot.active { background-color: #34d399; box-shadow: 0 0 8px #34d399; }
  </style>
</head>
<body>

  <div id="auroraBg" class="aurora-bg"></div>

  <div class="status-pill">
    <div id="statusDot" class="status-dot"></div>
    <span id="statusText">Connecting...</span>
  </div>

  <main class="presence-container">
    <div id="orb" class="orb"></div>
  </main>

  <footer class="control-bar">
    <button onclick="window.location.href='homepage1.html'" class="btn btn-exit" aria-label="Exit">
        <i class="fas fa-times text-xl"></i>
    </button>

    <button id="micBtn" class="btn btn-mic" aria-label="Toggle Microphone" disabled>
      <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
      </svg>
    </button>
  </footer>

  <script type="module">
    // --- 1. FIREBASE INITIALIZATION ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-functions.js";

    const firebaseConfig = {
        apiKey: "AIzaSyADgcz_naQ_5tpXcpI8tSvm1b4RVLDrlaw",
        authDomain: "medxcel.firebaseapp.com",
        projectId: "medxcel",
        storageBucket: "medxcel.firebasestorage.app",
        messagingSenderId: "649180317389",
        appId: "1:649180317389:web:f6b9a7053a37853ea04b84"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const functions = getFunctions(app, "us-central1");
    
    // Connect to the Firebase Backend securely!
    const askGeminiFunction = httpsCallable(functions, 'askGemini');
    const speakGeminiFunction = httpsCallable(functions, 'speakGemini');

    const SYSTEM_INSTRUCTION = `
      You are a casual, curious medical study partner. 
      Listen to the student's explanation.
      Your output must be JSON only. NO MARKDOWN.
      Use exactly this format:
      { 
        "good": "Short confirmation.", 
        "bad": "Short correction.", 
        "question": "A very natural, short follow-up question (max 8 words) to keep the chat flowing." 
      }
    `;

    // UI ELEMENTS
    const micBtn = document.getElementById('micBtn');
    const orb = document.getElementById('orb');
    const auroraBg = document.getElementById('auroraBg');
    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');

    let recognition;
    let isListening = false;
    let isSpeaking = false;

    // Verify user is logged in before enabling the microphone
    onAuthStateChanged(auth, (user) => {
        if (user) {
            micBtn.disabled = false;
            setVisualState('IDLE');
        } else {
            statusText.textContent = "Please log in";
        }
    });

    function setVisualState(state) {
      orb.classList.remove('listening', 'thinking', 'speaking');
      micBtn.classList.remove('active');
      statusDot.classList.remove('active');
      auroraBg.classList.remove('active');

      switch(state) {
        case 'IDLE':
          statusText.textContent = "Live";
          break;
        case 'LISTENING':
          orb.classList.add('listening');
          micBtn.classList.add('active');
          statusDot.classList.add('active');
          auroraBg.classList.add('active');
          statusText.textContent = "Listening";
          break;
        case 'THINKING':
          orb.classList.add('thinking');
          statusText.textContent = "Processing";
          break;
        case 'SPEAKING':
          orb.classList.add('speaking');
          auroraBg.classList.add('active');
          statusText.textContent = "Aurora";
          break;
      }
    }

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.lang = 'en-US';

      recognition.onstart = () => {
        isListening = true;
        setVisualState('LISTENING');
      };

      recognition.onend = () => {
        isListening = false;
        if (statusText.textContent !== "Processing" && !isSpeaking) {
          setVisualState('IDLE');
        }
      };

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        if (transcript.trim().length > 0) {
          setVisualState('THINKING');
          analyzeWithGemini(transcript);
        }
      };

      recognition.onerror = () => setVisualState('IDLE');
    } else {
      alert("Voice features require Google Chrome.");
    }

    micBtn.addEventListener('click', () => {
      if (isSpeaking) {
        window.speechSynthesis.cancel();
        isSpeaking = false;
      }
      if (isListening) recognition.stop();
      else recognition.start();
    });

    async function analyzeWithGemini(userText) {
      const fullPrompt = SYSTEM_INSTRUCTION + "\nStudent said: " + userText;
      
      try {
        // Send request cleanly to backend
        const result = await askGeminiFunction({ prompt: fullPrompt });
        
        let rawJsonText = result.data.text || "";
        rawJsonText = rawJsonText.replace(/```json/g, "").replace(/```/g, "").trim();
        
        const json = JSON.parse(rawJsonText);
        
        // Pick the follow up question
        const responseToSpeak = json.question || json.good || json.bad || "Could you tell me more?";
        await speakNaturally(responseToSpeak);

      } catch (err) {
        console.error("AI Error", err);
        setVisualState('IDLE');
      }
    }

    async function speakNaturally(text) {
      setVisualState('SPEAKING');
      isSpeaking = true;
      
      const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
      
      for (const sentence of sentences) {
        if (!isSpeaking) break;
        await playAudioChunk(sentence.trim());
      }
      
      isSpeaking = false;
      setVisualState('IDLE');
    }

    async function playAudioChunk(text) {
      return new Promise(async (resolve) => {
        if (!text) { resolve(); return; }

        try {
          // Request text-to-speech from backend
          const result = await speakGeminiFunction({ text: text });
          const data = result.data;
          
          if (!data.audio) throw new Error('No audio in response');

          const binary = atob(data.audio);
          const len = binary.length;
          const bytes = new Uint8Array(len);
          for (let i = 0; i < len; i++) {
            bytes[i] = binary.charCodeAt(i);
          }

          const blob = new Blob([bytes.buffer], { type: data.contentType || 'audio/mpeg' });
          const url = URL.createObjectURL(blob);
          const audio = new Audio(url);

          audio.onended = () => { URL.revokeObjectURL(url); resolve(); };
          audio.onerror = () => { URL.revokeObjectURL(url); fallbackTTS(text, resolve); };

          audio.play().catch(() => fallbackTTS(text, resolve));

        } catch (err) {
          console.error('TTS error', err);
          fallbackTTS(text, resolve);
        }
      });
    }

    function fallbackTTS(text, callback) {
        const utter = new SpeechSynthesisUtterance(text);
        utter.rate = 1.0;
        utter.pitch = 1.0;
        utter.onend = callback;
        window.speechSynthesis.speak(utter);
    }
  </script>
</body>
</html>
