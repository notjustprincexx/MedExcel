<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aurora - User Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ease-snap: cubic-bezier(0.19, 1, 0.22, 1);
        }
        
        body {
            background-color: #050A15;
            color: #ffffff;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        /* Updated Glassmorphism styling */
        .glass-panel {
            background: rgba(11, 17, 32, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .fade-in { animation: fadeIn 0.4s var(--ease-snap) forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Modal Styles remain unchanged for functionality */
        .modal-backdrop { position: fixed; inset: 0; background: rgba(5, 10, 21, 0.8); backdrop-filter: blur(4px); z-index: 9999; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.3s; }
        .modal-backdrop.show { opacity: 1; visibility: visible; }
        .modal-content { background: #0B1120; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1rem; padding: 1.5rem; width: 100%; max-width: 320px; transform: scale(0.95); transition: 0.3s; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .modal-backdrop.show .modal-content { transform: scale(1); }
        
        .modal-icon { width: 3rem; height: 3rem; border-radius: 50%; background: rgba(239, 68, 68, 0.1); display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; border: 1px solid rgba(239, 68, 68, 0.2); font-size: 1.25rem; color: #ef4444; }
        .modal-title { font-size: 1.125rem; font-weight: 600; color: white; margin-bottom: 0.5rem; }
        .modal-text { color: #94a3b8; font-size: 0.875rem; margin-bottom: 1.5rem; line-height: 1.5; }
        .modal-btn-primary { width: 100%; padding: 0.75rem; background: #ef4444; color: white; border: none; border-radius: 0.75rem; font-weight: 500; cursor: pointer; margin-bottom: 0.5rem; transition: 0.2s; }
        .modal-btn-primary:hover { background: #dc2626; }
        .modal-btn-secondary { width: 100%; padding: 0.75rem; background: transparent; color: #94a3b8; border: none; border-radius: 0.75rem; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .modal-btn-secondary:hover { color: white; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(5, 10, 21, 0.85); backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.05); padding: 0.75rem 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; z-index: 50; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 0.375rem; color: #64748b; text-decoration: none; transition: 0.2s; font-size: 1.25rem; }
        .nav-item span { font-size: 0.625rem; font-weight: 500; }
        .nav-item:hover { color: #94a3b8; }
        .nav-item.active { color: #22d3ee; } /* Updated active color to cyan */
        .nav-item.active span { font-weight: 700; }
    </style>
    <script>
        (function () {
            const saved = localStorage.getItem("nativeUser");
            if (saved) {
                try { window.currentUser = JSON.parse(saved); } catch (e) {}
            }
        })();
    </script>
</head>
<body class="h-screen flex flex-col overflow-hidden relative bg-[#050A15]">

    <div class="fixed top-[-15%] left-[-15%] w-[60%] h-[60%] bg-cyan-600/20 rounded-full blur-[120px] pointer-events-none z-0"></div>
    <div class="fixed bottom-[-10%] right-[-15%] w-[60%] h-[60%] bg-purple-600/20 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <div id="logoutModalBackdrop" class="modal-backdrop">
        <div class="modal-content">
            <div class="modal-icon"><i class="fas fa-sign-out-alt"></i></div>
            <h3 class="modal-title">Log Out</h3>
            <p class="modal-text">Are you sure you want to sign out of your account?</p>
            <button id="confirmLogoutBtn" class="modal-btn-primary">Yes, Log Out</button>
            <button id="cancelLogoutBtn" class="modal-btn-secondary">Cancel</button>
        </div>
    </div>

    <header class="pt-6 pb-4 px-6 flex items-center bg-transparent shrink-0 sticky top-0 z-40">
        <h1 class="text-2xl font-extrabold flex-1 tracking-tight text-white drop-shadow-md">Profile</h1>
    </header>

    <main class="flex-1 overflow-y-auto pb-32 px-5 space-y-6 fade-in relative z-10" style="-webkit-overflow-scrolling: touch;">

        <section class="glass-panel rounded-3xl p-6 flex flex-col items-center text-center relative overflow-hidden mt-2">
            
            <div class="relative inline-block mb-3">
                <div class="w-24 h-24 rounded-full border-[3px] border-cyan-400/60 bg-[#0B1120] flex items-center justify-center text-3xl font-bold text-cyan-100 shadow-[0_0_25px_rgba(34,211,238,0.25)] overflow-hidden relative z-10 p-1">
                    <div id="avatarContainer" class="w-full h-full rounded-full bg-[#050A15] flex items-center justify-center overflow-hidden relative">
                        <span id="userInitial">?</span>
                        <img id="userPhoto" src="" alt="Profile" class="w-full h-full object-cover hidden absolute inset-0">
                    </div>
                </div>
                <div class="absolute bottom-1 right-1 w-5 h-5 bg-green-500 border-[3px] border-[#050A15] rounded-full z-20 shadow-[0_0_10px_rgba(34,197,94,0.5)]"></div>
            </div>

            <h2 id="userName" class="text-2xl font-bold text-white relative z-10 leading-tight tracking-wide">Loading...</h2>
            <p id="userEmail" class="text-sm text-slate-400 relative z-10 font-medium">...</p>

            <div class="grid grid-cols-3 gap-3 w-full mt-6 relative z-10">
                <div class="bg-white/5 border border-white/5 rounded-2xl p-3 flex flex-col items-center justify-center">
                    <span class="text-cyan-400 text-[10px] font-extrabold uppercase tracking-widest mb-1">Points</span>
                    <span id="pointsCount" class="text-xl font-black text-white">0</span>
                </div>
                <div class="bg-white/5 border border-white/5 rounded-2xl p-3 flex flex-col items-center justify-center border-t-2 border-t-yellow-500/50 shadow-[0_-5px_15px_-5px_rgba(234,179,8,0.1)]">
                    <span class="text-yellow-500 text-[10px] font-extrabold uppercase tracking-widest mb-1">Rank</span>
                    <div class="flex items-center gap-1.5">
                        <i class="fas fa-shield-alt text-yellow-500 text-sm"></i>
                        <span id="userRank" class="text-xl font-black text-white">---</span>
                    </div>
                </div>
                <div class="bg-white/5 border border-white/5 rounded-2xl p-3 flex flex-col items-center justify-center">
                    <span class="text-purple-400 text-[10px] font-extrabold uppercase tracking-widest mb-1">Level</span>
                    <span id="userLevel" class="text-xl font-black text-white">1</span>
                </div>
            </div>
        </section>

        <section class="space-y-3">
            <h3 class="text-xs font-extrabold text-slate-400 uppercase tracking-widest mb-3 px-2">Account Settings</h3>
            
            <button id="btnResetPassword" class="w-full glass-panel rounded-2xl p-4 flex items-center justify-between group active:scale-[0.98] transition-all">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-400 group-hover:bg-blue-500 group-hover:text-white transition-colors">
                        <i class="fas fa-lock text-sm"></i>
                    </div>
                    <span class="text-sm font-semibold text-slate-200 tracking-wide">Change Password</span>
                </div>
                <i class="fas fa-chevron-right text-slate-600 text-sm"></i>
            </button>

            <button id="btnLogout" class="w-full glass-panel rounded-2xl p-4 flex items-center justify-between group active:scale-[0.98] transition-all">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-slate-700/30 flex items-center justify-center text-slate-400 group-hover:bg-slate-700 group-hover:text-white transition-colors">
                        <i class="fas fa-sign-out-alt text-sm"></i>
                    </div>
                    <span class="text-sm font-semibold text-slate-200 tracking-wide">Log Out</span>
                </div>
                <i class="fas fa-chevron-right text-slate-600 text-sm"></i>
            </button>

            <div class="pt-4">
                <button id="btnDeleteAccount" class="w-full glass-panel border-red-500/20 bg-red-500/5 rounded-2xl p-4 flex items-center justify-between group active:scale-[0.98] transition-all">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-red-500/10 flex items-center justify-center text-red-500 group-hover:bg-red-500 group-hover:text-white transition-colors">
                            <i class="fas fa-user-times text-sm"></i>
                        </div>
                        <span class="text-sm font-semibold text-red-500 tracking-wide">Delete Account</span>
                    </div>
                </button>
            </div>
        </section>

    </main>

    <nav id="bottomNav" class="bottom-nav">
        <a href="homepage.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="create.html" class="nav-item">
            <i class="fas fa-plus"></i>
            <span>Create</span>
        </a>
        <a href="study.html" class="nav-item">
            <i class="fas fa-folder"></i>
            <span>Library</span>
        </a>
        <a href="profile.html" class="nav-item active">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // REAL CONFIG INJECTED
        const firebaseConfig = {
            apiKey: "AIzaSyADgcz_naQ_5tpXcpI8tSvm1b4RVLDrlaw",
            authDomain: "medxcel.firebaseapp.com",
            projectId: "medxcel",
            storageBucket: "medxcel.firebasestorage.app",
            messagingSenderId: "649180317389",
            appId: "1:649180317389:web:f6b9a7053a37853ea04b84"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function setDefaultUI() {
            document.getElementById("pointsCount").textContent = "0";
            document.getElementById("userRank").textContent = "Unranked";
            document.getElementById("userLevel").textContent = "1";
        }

        // --- HYBRID AUTHENTICATION GATEKEEPER ---
        const savedUserStr = localStorage.getItem("nativeUser");
        let nativeUserObj = null;
        try { if (savedUserStr) nativeUserObj = JSON.parse(savedUserStr); } catch(e) {}

        onAuthStateChanged(auth, async (firebaseUser) => {
            const activeUser = firebaseUser || nativeUserObj;

            if (activeUser) {
                // Keep local storage perfectly synced if Firebase web sdk wakes up
                if (firebaseUser) {
                    localStorage.setItem("nativeUser", JSON.stringify({ 
                        email: firebaseUser.email, 
                        uid: firebaseUser.uid, 
                        displayName: firebaseUser.displayName 
                    }));
                }

                // Pre-fill what we know immediately to prevent flickering
                const email = activeUser.email || "";
                const name = activeUser.displayName || email.split("@")[0] || "User";
                
                document.getElementById("userName").textContent = name;
                document.getElementById("userEmail").textContent = email;
                document.getElementById("userInitial").textContent = email ? email.charAt(0).toUpperCase() : "?";

                // Pull the rest from Firestore safely
                try {
                    let userRef = doc(db, "users", activeUser.uid);
                    let userDoc = await getDoc(userRef);

                    // Fallback lookup
                    if (!userDoc.exists() && activeUser.email) {
                        userRef = doc(db, "users", activeUser.email);
                        userDoc = await getDoc(userRef);
                    }

                    if (!userDoc.exists()) {
                        setDefaultUI();
                        return;
                    }

                    const userData = userDoc.data();
                    
                    // Format large numbers with commas if they exist
                    const points = userData.points || 0;
                    document.getElementById("pointsCount").textContent = points.toLocaleString();
                    
                    document.getElementById("userRank").textContent = userData.rank || "Bronze";
                    document.getElementById("userLevel").textContent = userData.level || "1";

                } catch (e) {
                    console.warn("Firestore Error/Restricted. Defaulting UI.", e);
                    setDefaultUI();
                }
            } else {
                localStorage.clear();
                window.location.replace("index.html");
            }
        });

        // --- BUTTON HANDLERS ---
        document.getElementById('btnLogout').addEventListener('click', () => {
            document.getElementById('logoutModalBackdrop').classList.add('show');
        });

        document.getElementById('cancelLogoutBtn').addEventListener('click', () => {
            document.getElementById('logoutModalBackdrop').classList.remove('show');
        });

        document.getElementById('confirmLogoutBtn').onclick = async () => {
            try { await signOut(auth); } catch(e) {}
            localStorage.clear();
            window.location.replace("index.html");
        };

        document.getElementById('btnResetPassword').addEventListener('click', () => {
            alert("Action requires email verification. Please check your inbox or contact support.");
        });

        document.getElementById('btnDeleteAccount').addEventListener('click', async () => {
            if(confirm("DANGER: Are you sure you want to delete your account? All data will be lost.")) {
                try { await signOut(auth); } catch(e) {}
                localStorage.clear();
                window.location.replace("index.html");
            }
        });
    </script>
</body>
</html>
