<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join MedExcel Study Group</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 1.5rem;
    }
    .card {
      background: #1a1a2e;
      border: 1px solid rgba(139,92,246,0.2);
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .logo {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      border-radius: 1rem;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem;
      font-size: 1.75rem;
    }
    h1 { font-size: 1.375rem; font-weight: 800; color: #fff; margin-bottom: 0.5rem; }
    p  { font-size: 0.9rem; color: #8b8ba7; line-height: 1.6; margin-bottom: 2rem; }
    .btn-primary {
      display: block; width: 100%; padding: 1rem;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff; font-size: 1rem; font-weight: 700;
      border: none; border-radius: 9999px; cursor: pointer;
      text-decoration: none; margin-bottom: 0.875rem;
    }
    .btn-secondary {
      display: block; width: 100%; padding: 0.875rem;
      background: transparent; color: #8b8ba7;
      font-size: 0.9rem; font-weight: 600;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 9999px; cursor: pointer; text-decoration: none;
    }
    .code-box {
      display: inline-block;
      background: rgba(139,92,246,0.1);
      border: 1px solid rgba(139,92,246,0.25);
      border-radius: 0.75rem;
      padding: 0.5rem 1.25rem;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      color: #a78bfa;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📚</div>
    <h1>Join Study Group</h1>
    <p>You've been invited to join a MedExcel study group.</p>

    <div id="codeBox" class="code-box" style="display:none;"></div>

    <a id="openBtn" href="#" class="btn-primary">Open in MedExcel App</a>
    <a id="storeBtn" href="https://play.google.com/store/apps/details?id=com.medexcel.app" class="btn-secondary">Download MedExcel</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code   = params.get('code');

    if (!code) {
      document.querySelector('p').textContent = 'Invalid invite link. Ask for a new one.';
      document.getElementById('openBtn').style.display = 'none';
    } else {
      // Show the code
      const codeBox = document.getElementById('codeBox');
      codeBox.textContent = code.toUpperCase();
      codeBox.style.display = 'inline-block';

      // Android Intent URL — Chrome handles this natively:
      // tries to open app, falls back to Play Store if not installed
      const intentUrl = 'intent://auth?code=' + encodeURIComponent(code)
        + '#Intent'
        + ';scheme=medxcel'
        + ';package=com.medexcel.app'
        + ';S.browser_fallback_url=' + encodeURIComponent('https://play.google.com/store/apps/details?id=com.medexcel.app')
        + ';end';

      document.getElementById('openBtn').href = intentUrl;

      // Auto-trigger on load
      window.location.href = intentUrl;
    }
  </script>
</body>
</html>
