<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join MedExcel Study Group</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 1.5rem;
    }
    .card {
      background: #1a1a2e;
      border: 1px solid rgba(139,92,246,0.2);
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
      font-size: 1.75rem;
    }
    h1 {
      font-size: 1.375rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 0.9rem;
      color: #8b8ba7;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn-primary {
      display: block;
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 9999px;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 0.875rem;
      transition: opacity 0.15s;
    }
    .btn-primary:active { opacity: 0.85; }
    .btn-secondary {
      display: block;
      width: 100%;
      padding: 0.875rem;
      background: transparent;
      color: #8b8ba7;
      font-size: 0.9rem;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 9999px;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn-secondary:active { opacity: 0.7; }
    .status {
      font-size: 0.8rem;
      color: #6d6d8a;
      margin-top: 1.25rem;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(139,92,246,0.3);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📚</div>
    <h1>Join Study Group</h1>
    <p id="subtitle">Opening MedExcel for you…</p>

    <div id="openBtn" class="hidden">
      <a id="appLink" href="#" class="btn-primary">Open in MedExcel App</a>
      <a href="https://play.google.com/store/apps/details?id=com.medxcel.app"
         class="btn-secondary">Download MedExcel</a>
    </div>

    <p class="status" id="status">
      <span class="spinner"></span> Redirecting…
    </p>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const code   = params.get('code');

      if (!code) {
        document.getElementById('subtitle').textContent =
          'Invalid invite link. Ask your friend to share a new one.';
        document.getElementById('status').textContent = '';
        return;
      }

      const appScheme = 'medxcel://auth?code=' + encodeURIComponent(code);

      // Show manual button after 2.5 s in case auto-redirect fails
      const showFallback = setTimeout(function () {
        document.getElementById('appLink').href = appScheme;
        document.getElementById('openBtn').classList.remove('hidden');
        document.getElementById('status').textContent =
          'Tap above if the app didn\'t open automatically.';
        document.getElementById('subtitle').textContent =
          'You were invited to a MedExcel study group.';
      }, 2500);

      // Attempt to open the app immediately
      window.location.href = appScheme;

      // If we're still here after 3 s, the app isn't installed
      setTimeout(function () {
        clearTimeout(showFallback);
        document.getElementById('appLink').href = appScheme;
        document.getElementById('openBtn').classList.remove('hidden');
        document.getElementById('status').textContent = '';
        document.getElementById('subtitle').textContent =
          'Install MedExcel to join this study group.';
      }, 3000);
    })();
  </script>
</body>
</html>
