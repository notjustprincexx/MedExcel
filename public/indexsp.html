<!DOCTYPE html>
<html lang="en">
<head>
    <script>
    const savedUser = localStorage.getItem("nativeUser");
    if (savedUser && savedUser !== "undefined" && savedUser !== "null") {
        window.location.replace("homepage.html");
    }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#050A15">
    <title>MedExcel - Welcome</title>
    
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js" as="script">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        window.AssetManager = {
            cache: {},
            preload: function(key, url) {
                this.cache[key] = fetch(url).then(res => res.json()).catch(err => console.warn(`Failed to preload ${key}:`, err));
            },
            get: async function(key) {
                return await this.cache[key];
            }
        };
        AssetManager.preload('loader', 'Loader.json'); 
    </script>

    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js" onload="initAnimations()"></script>

    <style>
        :root {
            --bg-main: #050A15; 
            --bg-card: #0B1120; 
            --bg-card-hover: rgba(255, 255, 255, 0.05); 
            --text-main: #ffffff; 
            --text-muted: #94a3b8; 
            --text-light: #cbd5e1;
            --accent-btn: #7c3aed; 
            --accent-blue: #3b82f6; 
            --accent-blue-hover: #60a5fa; 
            --accent-blue-dark: #2563eb; 
            --border-color: rgba(255, 255, 255, 0.05); 
            --ease-snap: cubic-bezier(0.19, 1, 0.22, 1); 
            --ease-out: cubic-bezier(0.33, 1, 0.68, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; scrollbar-width: none !important; -ms-overflow-style: none !important; }
        ::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }
        body { background-color: var(--bg-main); color: var(--text-main); height: 100vh; overflow: hidden; -webkit-user-select: none; user-select: none; position: relative; display: flex; flex-direction: column; }
        button { cursor: pointer; border: none; outline: none; background: transparent; font-family: inherit; }
        input { font-family: inherit; outline: none; border: none; background: transparent; color: var(--text-main); }

        /* Loader */
        .loader-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg-main); z-index: 10000; transition: opacity 0.4s ease, visibility 0.4s; }
        .loader-content { display: flex; flex-direction: column; align-items: center; gap: 1.25rem; }
        .loader-graphic-container { position: relative; width: 80px; height: 80px; display: flex; justify-content: center; align-items: center; }
        .lottie-loader-layer { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .loading-text { color: var(--text-light); font-size: 0.875rem; font-weight: 600; letter-spacing: 0.05em; animation: pulse 1.5s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Dialogs */
        .ok-backdrop { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 99999; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); }
        .ok-dialog { width: 90%; max-width: 400px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 24px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); transform: scale(0.95); opacity: 0; transition: all 0.2s var(--ease-out); }
        .ok-backdrop.active .ok-dialog { transform: scale(1); opacity: 1; }
        .dialog-title { font-size: 1.125rem; font-weight: bold; margin-bottom: 0.5rem; }
        .dialog-msg { color: var(--text-light); font-size: 0.875rem; margin-bottom: 1.5rem; line-height: 1.6; }
        .dialog-actions { display: flex; justify-content: flex-end; gap: 0.75rem; }
        .btn-cancel { padding: 0.5rem 1rem; color: var(--text-muted); font-weight: bold; font-size: 0.875rem; transition: color 0.2s; }
        .btn-cancel:hover { color: var(--text-main); }
        .btn-confirm { padding: 0.5rem 1.5rem; background: var(--accent-blue-dark); color: white; border-radius: 0.75rem; font-weight: bold; font-size: 0.875rem; transition: transform 0.1s; }
        .btn-confirm:active { transform: scale(0.95); }

        /* Screens */
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; z-index: 50; transition: opacity 0.4s var(--ease-snap), transform 0.4s var(--ease-snap); opacity: 0; pointer-events: none; transform: scale(0.98); overflow: hidden; background: var(--bg-main); }
        .screen.active { opacity: 1; pointer-events: auto; transform: scale(1); }

        /* Full Screen Onboarding Carousel */
        .top-bar-overlay { position: absolute; top: 0; right: 0; width: 100%; display: flex; justify-content: flex-end; padding: max(1.5rem, env(safe-area-inset-top)) 1.5rem 0; z-index: 100; }
        .btn-skip-new { color: rgba(0,0,0,0.5); font-size: 1rem; font-weight: 600; padding: 0.5rem 1rem; background: rgba(255,255,255,0.3); border-radius: 20px; backdrop-filter: blur(5px); transition: transform 0.2s, background 0.2s; }
        .btn-skip-new:active { transform: scale(0.95); background: rgba(255,255,255,0.5); }
        .theme-light .btn-skip-new { color: white; background: rgba(0,0,0,0.2); }

        .carousel-container { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            overflow-x: auto; 
            scroll-snap-type: x mandatory; 
            -webkit-overflow-scrolling: touch; 
        }
        
        .onboarding-slide { 
            flex: 0 0 100vw; 
            height: 100vh; 
            scroll-snap-align: start; 
            position: relative; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        .slide-content { padding: max(6rem, calc(4rem + env(safe-area-inset-top))) 2.5rem 0; z-index: 2; display: flex; flex-direction: column; }
        .slide-content.left-align { align-items: flex-start; text-align: left; }
        .slide-content.right-align { align-items: flex-end; text-align: right; }

        .slide-title { font-size: 2.75rem; font-weight: 800; line-height: 1.1; margin-bottom: 0.75rem; letter-spacing: -0.02em; }
        
        .vertical-dots { display: flex; flex-direction: column; gap: 8px; margin-top: 1rem; }
        .vertical-dots span { width: 8px; height: 8px; border-radius: 50%; }
        
        .theme-dark .slide-title { color: #1a1a1a; }
        .theme-dark .vertical-dots span { background-color: rgba(0,0,0,0.25); }
        .theme-light .slide-title { color: #ffffff; }
        .theme-light .vertical-dots span { background-color: rgba(255,255,255,0.4); }

        .slide-character { position: absolute; bottom: 0; height: 60vh; max-height: 600px; width: auto; z-index: 1; pointer-events: none; object-fit: contain; }
        
        /* Bleed effects to cut characters at screen edges */
        .slide-character.char-right { right: 0; transform: translateX(35%); }
        .slide-character.char-left { left: 0; transform: translateX(-35%); }

        .card-controls { position: absolute; bottom: max(3rem, env(safe-area-inset-bottom)); display: flex; align-items: center; gap: 1.5rem; z-index: 3; }
        .card-controls.controls-left { left: 2.5rem; flex-direction: row; }
        .card-controls.controls-right { right: 2.5rem; flex-direction: row-reverse; }

        .btn-next-card { padding: 0.875rem 2rem; border-radius: 30px; font-weight: 700; font-size: 1rem; backdrop-filter: blur(5px); transition: transform 0.2s; cursor: pointer; }
        .btn-next-card:active { transform: scale(0.95); }
        .theme-dark .btn-next-card { background: rgba(0,0,0,0.08); color: #1a1a1a; border: 1px solid rgba(0,0,0,0.05); }
        .theme-light .btn-next-card { background: rgba(255,255,255,0.25); color: white; border: 1px solid rgba(255,255,255,0.1); }

        .card-dots { display: flex; gap: 8px; align-items: center; }
        .card-dot { width: 8px; height: 8px; border-radius: 50%; }
        .card-dot.active { width: 20px; border-radius: 10px; }
        
        .theme-dark .card-dot { background: rgba(0,0,0,0.2); }
        .theme-dark .card-dot.active { background: #1a1a1a; }
        .theme-light .card-dot { background: rgba(255,255,255,0.4); }
        .theme-light .card-dot.active { background: white; }

        /* Login Modal & Auth Selection */
        .login-modal { position: fixed; inset: 0; z-index: 60; background: var(--bg-main); display: flex; flex-direction: column; padding: 1.5rem; transition: all 0.3s ease; opacity: 0; transform: translateY(40px); pointer-events: none; }
        .login-modal.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .login-header { display: flex; align-items: center; justify-content: space-between; margin: 0.5rem 0 2.5rem 0; }
        .btn-close { color: var(--text-muted); padding: 0.5rem; margin-left: -0.5rem; transition: color 0.2s; }
        .btn-close:hover { color: var(--text-main); }
        .login-title { color: var(--text-muted); font-weight: bold; font-size: 1.125rem; flex: 1; text-align: center; margin-right: 1.5rem; }
        .login-form { width: 100%; max-width: 24rem; margin: 0 auto; }
        .input-group { background: var(--bg-card); border: 2px solid var(--border-color); border-radius: 1rem; margin-bottom: 1.5rem; overflow: hidden; transition: border-color 0.2s; }
        .input-group:focus-within { border-color: var(--text-muted); }
        .input-row { position: relative; border-bottom: 2px solid var(--border-color); }
        .input-row:last-child { border-bottom: none; }
        .input-field { width: 100%; padding: 1rem; font-weight: 500; }
        .input-field::placeholder { color: var(--text-muted); }
        .btn-toggle-pw { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); transition: color 0.2s; }
        .btn-toggle-pw:hover { color: var(--accent-blue-hover); }
        
        .btn-signin { width: 100%; background: var(--border-color); color: var(--text-light); font-weight: 800; font-size: 0.875rem; padding: 0.875rem; border-radius: 1rem; border-bottom: 4px solid var(--bg-card); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1.5rem; transition: all 0.1s; }
        .btn-signin:active { border-bottom-width: 0; transform: translateY(4px); }
        .btn-forgot { width: 100%; color: var(--accent-blue-hover); font-weight: 800; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 3rem; transition: color 0.2s; }
        .btn-google { width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem; background: var(--bg-card); border: 2px solid var(--border-color); border-radius: 1rem; padding: 0.75rem; transition: all 0.1s; }
        .btn-google:hover { background: var(--bg-card-hover); }
        .btn-google:active { transform: scale(0.95); }
        .google-text { color: var(--text-light); font-weight: bold; font-size: 0.875rem; letter-spacing: 0.025em; }

        .auth-selection { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; padding: 2rem; text-align: center;}
        .auth-selection.active { display: flex; animation: fade 0.4s var(--ease-snap); }
        @keyframes fade { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .auth-title { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
        .auth-sub { color: var(--text-muted); font-size: 1rem; margin-bottom: 2.5rem; }
        
        .btn-auth-primary { width: 100%; max-width: 320px; background: var(--accent-btn); color: var(--text-main); font-weight: 700; padding: 1.125rem; border-radius: 100px; margin-bottom: 1rem; font-size: 1.0625rem; transition: transform 0.15s; }
        .btn-auth-primary:active { transform: scale(0.97); }
        .btn-auth-secondary { width: 100%; max-width: 320px; background: transparent; border: 2px solid var(--border-color); color: var(--text-main); font-weight: 700; padding: 1.125rem; border-radius: 100px; font-size: 1.0625rem; transition: transform 0.15s, background 0.2s; }
        .btn-auth-secondary:active { transform: scale(0.97); background: rgba(255,255,255,0.05); }

    </style>
</head>
<body>

    <div id="app" style="transition: opacity 0.2s ease-in-out; opacity: 1; height: 100%; width: 100%; display: flex; flex-direction: column; overflow: hidden; position: relative;">
        
        <div id="loaderScreen" class="loader-screen" role="status" aria-live="polite">
            <div class="loader-content">
                <div class="loader-graphic-container">
                    <div id="lottieLoader" class="lottie-loader-layer"></div>
                </div>
                <div class="loading-text">Loading MedExcel...</div>
            </div>
        </div>

        <div id="okBackdrop" class="ok-backdrop" aria-hidden="true" role="dialog" aria-modal="true">
            <div class="ok-dialog" role="document">
                <h3 id="okTitle" class="dialog-title">Notice</h3>
                <p id="okMessage" class="dialog-msg">Message goes here</p>
                <div class="dialog-actions">
                    <button id="okCancel" class="btn-cancel">Cancel</button>
                    <button id="okConfirm" class="btn-confirm">OK</button>
                </div>
            </div>
        </div>

        <div id="introScreen" class="screen active">
            
            <div class="top-bar-overlay">
                <button class="btn-skip-new" onclick="showAuthSelection()">Skip</button>
            </div>

            <div class="carousel-container" id="onboardingCarousel">
                
                <div class="onboarding-slide theme-dark" style="background-color: #fee5c6;">
                    <div class="slide-content left-align">
                        <h2 class="slide-title">AI-Powered<br>Decks</h2>
                        <div class="vertical-dots">
                            <span></span><span></span><span></span><span></span>
                        </div>
                    </div>
                    <img src="pic1.svg" alt="AI Features" class="slide-character char-right">
                    <div class="card-controls controls-left">
                        <button class="btn-next-card" onclick="nextSlide()">Next</button>
                        <div class="card-dots">
                            <div class="card-dot active"></div>
                            <div class="card-dot"></div>
                            <div class="card-dot"></div>
                            <div class="card-dot"></div>
                        </div>
                    </div>
                </div>

                <div class="onboarding-slide theme-light" style="background-color: #b5b9e9;">
                    <div class="slide-content right-align">
                        <h2 class="slide-title">Master Active<br>Recall</h2>
                        <div class="vertical-dots">
                            <span></span><span></span><span></span><span></span>
                        </div>
                    </div>
                    <img src="pic2.svg" alt="Active Recall" class="slide-character char-left">
                    <div class="card-controls controls-right">
                        <button class="btn-next-card" onclick="nextSlide()">Next</button>
                        <div class="card-dots">
                            <div class="card-dot"></div>
                            <div class="card-dot active"></div>
                            <div class="card-dot"></div>
                            <div class="card-dot"></div>
                        </div>
                    </div>
                </div>

                <div class="onboarding-slide theme-light" style="background-color: #53B55C;">
                    <div class="slide-content right-align">
                        <h2 class="slide-title">Track Your<br>Progress</h2>
                        <div class="vertical-dots">
                            <span></span><span></span><span></span><span></span>
                        </div>
                    </div>
                    <img src="pic3.svg" alt="Track Progress" class="slide-character char-left">
                    <div class="card-controls controls-right">
                        <button class="btn-next-card" onclick="nextSlide()">Next</button>
                        <div class="card-dots">
                            <div class="card-dot"></div>
                            <div class="card-dot"></div>
                            <div class="card-dot active"></div>
                            <div class="card-dot"></div>
                        </div>
                    </div>
                </div>

                <div class="onboarding-slide theme-light" style="background-color: #455168;">
                    <div class="slide-content left-align">
                        <h2 class="slide-title">Achieve<br>Excellence</h2>
                        <div class="vertical-dots">
                            <span></span><span></span><span></span><span></span>
                        </div>
                    </div>
                    <img src="pic4.svg" alt="Excellence" class="slide-character char-right">
                    <div class="card-controls controls-left">
                        <button class="btn-next-card" onclick="showAuthSelection()">Start</button>
                        <div class="card-dots">
                            <div class="card-dot"></div>
                            <div class="card-dot"></div>
                            <div class="card-dot"></div>
                            <div class="card-dot active"></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div id="authSelectionScreen" class="screen">
            <div class="auth-selection active">
                <div style="width: 80px; height: 80px; border-radius: 20px; background: var(--bg-card); display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; border: 1px solid var(--border-color); color: var(--accent-blue); font-size: 2rem;">
                    <i class="fas fa-stethoscope"></i>
                </div>
                <h2 class="auth-title">MedExcel</h2>
                <p class="auth-sub">Your intelligent study companion.</p>
                
                <button onclick="toggleLogin(true, true)" class="btn-auth-primary">Create Account</button>
                <button onclick="toggleLogin(true, false)" class="btn-auth-secondary">Log In</button>
            </div>
        </div>

        <div id="loginScreen" class="login-modal">
            <div class="login-header">
                <button onclick="toggleLogin(false)" class="btn-close">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
                <h2 id="loginHeading" class="login-title">Enter your details</h2>
            </div>
            <div class="login-form">
                <div class="input-group">
                    <div id="nameRow" class="input-row" style="display: none;">
                        <input id="nameInput" type="text" placeholder="Your name or nickname" class="input-field">
                    </div>
                    <div class="input-row">
                        <input id="emailInput" type="text" placeholder="Username or email" class="input-field">
                    </div>
                    <div class="input-row">
                        <input id="loginPassword" type="password" placeholder="Password" class="input-field">
                        <button onclick="togglePassword()" class="btn-toggle-pw">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8-11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                </div>
                <button id="signInBtn" class="btn-signin">Sign In</button>
                <button class="btn-forgot">Forgot Password</button>
                
                <button onclick="startGoogleLogin()" class="btn-google">
                    <svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    <span class="google-text">GOOGLE</span>
                </button>
            </div>
        </div>

    </div>
    <script>
        function nextSlide() {
            const container = document.getElementById('onboardingCarousel');
            const nextScroll = container.scrollLeft + window.innerWidth;
            container.scrollTo({ left: nextScroll, behavior: 'smooth' });
        }

        function showAuthSelection() {
            document.getElementById('introScreen').classList.remove('active');
            document.getElementById('authSelectionScreen').classList.add('active');
        }

        window.initAnimations = function() {
            const injectLottie = async (elementId, cacheKey) => {
                const data = await AssetManager.get(cacheKey);
                if(!data) return;
                const container = document.getElementById(elementId);
                if (container) {
                    lottie.loadAnimation({ container: container, renderer: 'svg', loop: true, autoplay: true, animationData: data });
                }
            };
            injectLottie('lottieLoader', 'loader');
        };

        window.__loader = {
            startTime: Date.now(), minMs: 0, authResolved: false, windowLoaded: false, redirecting: false,
            checkHide() {
                if (this.redirecting) return;
                if (this.authResolved && this.windowLoaded) {
                    const elapsed = Date.now() - this.startTime;
                    const remaining = Math.max(0, this.minMs - elapsed);
                    setTimeout(() => {
                        const loader = document.getElementById('loaderScreen');
                        if(loader) { loader.style.opacity = '0'; setTimeout(() => { loader.style.visibility = 'hidden'; document.body.style.pointerEvents = 'auto'; }, 400); }
                    }, remaining);
                }
            }
        };

        document.body.style.pointerEvents = 'none';
        window.addEventListener('load', () => { window.__loader.windowLoaded = true; window.__loader.checkHide(); });

        window.showDialog = function (message, title = "Notice", options = {}) {
            return new Promise((resolve) => {
                const backdrop = document.getElementById("okBackdrop");
                const titleEl = document.getElementById("okTitle");
                const msgEl = document.getElementById("okMessage");
                const btnOk = document.getElementById("okConfirm");
                const btnCancel = document.getElementById("okCancel");

                titleEl.textContent = title; msgEl.textContent = message;
                btnOk.textContent = options.okText || "OK"; btnCancel.textContent = options.cancelText || "Cancel";
                btnCancel.style.display = options.hideCancel ? 'none' : 'block';
                backdrop.style.display = "flex"; void backdrop.offsetWidth; backdrop.classList.add("active");

                const cleanup = (result) => {
                    backdrop.classList.remove("active");
                    setTimeout(() => { backdrop.style.display = "none"; resolve(result); }, 200);
                };
                btnOk.onclick = () => cleanup(true); btnCancel.onclick = () => cleanup(false);
            });
        };

        window.isSignupMode = false;
        function toggleLogin(show, signup = false) {
            const login = document.getElementById('loginScreen');
            const titleEl = document.getElementById('loginHeading');
            const signInBtn = document.getElementById('signInBtn');
            const nameRow = document.getElementById('nameRow'); 
            window.isSignupMode = !!signup;

            if (show) {
                titleEl.textContent = window.isSignupMode ? 'Create your account' : 'Enter your details';
                signInBtn.textContent = window.isSignupMode ? 'Sign Up' : 'Sign In';
                nameRow.style.display = window.isSignupMode ? 'block' : 'none';
                login.classList.add('show');
            } else {
                login.classList.remove('show');
                setTimeout(() => {
                    window.isSignupMode = false;

        (function openAuthFromUrl() {
            try {
                const hash = (location.hash || '').replace('#', '').toLowerCase();
                const params = new URLSearchParams(location.search);
                const action = params.get('action') ? params.get('action').toLowerCase() : null;
                
                if (hash === 'login' || action === 'login') {
                    showAuthSelection();
                    setTimeout(() => toggleLogin(true, false), 100);

                    showAuthSelection();
                    setTimeout(() => toggleLogin(true, true), 100);

            } catch (e) { console.warn('openAuthFromUrl failed', e); }
        })();

    <script>
        // SPA Router System
        (function initSPARouter() {
            const pageCache = new Map();
            let isNavigating = false;

            // Initialize caching for the current page
            pageCache.set(window.location.pathname + window.location.search, document.body.innerHTML);

            // Handle browser Back/Forward buttons
            window.addEventListener('popstate', (e) => {
                const url = window.location.pathname + window.location.search + window.location.hash;
                loadPage(url, false);
            });

            // Intercept all clicks on the document
            document.addEventListener('click', (e) => {
                // Traverse up to find an anchor tag
                const link = e.target.closest('a');
                if (!link || !link.href) return;

                const url = new URL(link.href);
                const currentUrl = new URL(window.location.href);

                // Ignore external links, new tabs, or anchor jumps on the same page
                if (url.origin !== currentUrl.origin || link.target === '_blank') return;
                if (url.pathname === currentUrl.pathname && url.search === currentUrl.search) return;

                e.preventDefault();
                loadPage(url.pathname + url.search + url.hash, true);
            });

            async function loadPage(url, pushHistory = true) {
                if (isNavigating) return;
                isNavigating = true;

                const appContainer = document.getElementById('app');
                if (!appContainer) {
                    window.location.href = url; // Fallback if container is missing
                    return;
                }

                // Trigger fade out
                appContainer.style.opacity = '0';

                try {
                    let html;
                    
                    // Check cache first
                    if (pageCache.has(url)) {
                        html = pageCache.get(url);
                    } else {
                        const response = await fetch(url);
                        if (!response.ok) throw new Error('Failed to fetch page');
                        html = await response.text();
                        pageCache.set(url, html); // Cache the fetched page
                    }

                    // Parse the fetched HTML
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');

                    // Wait for the fade-out transition (200ms)
                    setTimeout(() => {
                        if (pushHistory) {
                            window.history.pushState({ url }, doc.title, url);
                        }
                        document.title = doc.title;

                        // Extract the #app content if it exists in the fetched page, otherwise fallback to body
                        const fetchedApp = doc.body.querySelector('#app');
                        appContainer.innerHTML = fetchedApp ? fetchedApp.innerHTML : doc.body.innerHTML;

                        // Execute scripts safely without duplicating Firebase/Global logic
                        executePageScripts(appContainer);

                        // Trigger fade in
                        appContainer.style.opacity = '1';
                        isNavigating = false;
                    }, 200);

                } catch (error) {
                    console.warn("SPA Load Failed, falling back to standard navigation:", error);
                    window.location.href = url;
                }
            }

            function executePageScripts(container) {
                const scripts = container.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    // Safety Constraint: Do NOT re-run Firebase initializations or module scripts
                    // to prevent "Firebase App already exists" errors or duplicate global variables.
                    const scriptText = oldScript.innerHTML || "";
                    if (oldScript.src && oldScript.src.includes('firebase')) return;
                    if (scriptText.includes('initializeApp(firebaseConfig)')) return;
                    if (oldScript.type === 'module') return; 

                    // Create a new script tag to force browser execution
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    if (oldScript.innerHTML) {
                        newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    }
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
            }
        })();
    </script>
