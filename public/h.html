<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <style>
    /* Floating Animation */
    @keyframes float {
      0%, 100% { transform: translate(200px, 200px) rotate(-10deg) translateY(0px); }
      50% { transform: translate(200px, 200px) rotate(-10deg) translateY(-15px); }
    }

    /* Breathing Animation */
    @keyframes breathe {
      0%, 100% { transform: scale(1, 1); }
      50% { transform: scale(1.02, 0.98); }
    }

    /* Blinking Animation */
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }

    /* Pupil Movement */
    @keyframes look {
      0%, 100% { transform: translateX(0px); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .character-group {
      animation: float 4s ease-in-out infinite;
    }

    .body-group {
      animation: breathe 3s ease-in-out infinite;
    }

    .eye-group {
      transform-origin: -6px -56px;
      animation: blink 4.5s infinite;
    }

    .pupil {
      animation: look 7s ease-in-out infinite;
    }
  </style>

  <g class="character-group">
    <g class="body-group">
      <rect x="-70" y="-120" width="140" height="240" rx="28" fill="#2a85ff" />

      <g class="eye-group">
        <ellipse cx="-6" cy="-56" rx="24" ry="14" fill="#ffffff" />
        <circle class="pupil" cx="2" cy="-56" r="8" fill="#000000" />
      </g>

      <path d="M -40 -20 L 40 -20 A 40 38 0 0 1 -40 -20 Z" fill="#000000" />

      <path d="M -26 -20 L -8 -20 L -8 -6 A 4 4 0 0 1 -12 -2 L -22 -2 A 4 4 0 0 1 -26 -6 Z" fill="#ffffff" />
    </g>
  </g>
</svg>
